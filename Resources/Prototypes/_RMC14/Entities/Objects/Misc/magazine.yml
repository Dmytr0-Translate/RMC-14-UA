  description: "Єдиний офіційний журнал КМПОН. Заголовок випуску: 'Сухпайки СПН: правда'. На обкладинці зображено трофейний сухпай комуністів."
  components:
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-boots-150

- type: entity
  parent: RMCMagazineBootsN160
  id: RMCMagazineBootsN189
  name: Берці! Випуск №189.
  description: "Єдиний офіційний журнал КМПОН. Заголовок випуску: 'Видання для Військової Поліції: ті, хто допомагає морпіхам допомагати самим собі!'. Як і на кожному примірнику випуску №189, який вам доводилося бачити, хтось не пошкодував часу, аби спаплюжити його грубими написами та непристойними малюнками."

