- type: entity
  parent: RMCMagazineBootsN160
  id: RMCMagazineBootsN125
  name: Берці! Випуск №125.
  description: "Єдиний офіційний журнал КМПОН. Заголовок випуску: 'Загін 'Браво'… Не лише для служби на ПОБі!'. Попри назву, стаття переважно складається з фотографій барикад і схем розміщення ящиків із боєприпасами."

- type: entity
  parent: RMCMagazineBootsN160
  id: RMCMagazineBootsN131
  name: Берці! Випуск №131.
  description: "Єдиний офіційний журнал КМПОН. Заголовок випуску: 'НІЯКОЇ ДИМАРНІ'. У наступному абзаці докладно пояснюється, чому димові гранати ВДР небезпечні при тривалому вдиханні, а гіпоксія – кепський спосіб зловити кайф."

- type: entity
  parent: RMCMagazineBootsN160
