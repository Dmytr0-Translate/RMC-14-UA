- type: entity
  parent: BaseItem
  id: CMPamphlet
  name: загальний довідник
  description: Тут написано те, як щось там зробити.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/pamphlets.rsi
    state: pamphlet_written
  - type: Item
    size: Tiny
  - type: SkillPamphlet
    bypassLimit: true # Sich. Дайте читати довідники скільки лізе
    whitelists:
    - popup: rmc-pamphlets-cant-use
      restrictions:
        components:
        - Marine
  - type: EmitSoundOnPickup
    sound:
      path: /Audio/_RMC14/Handling/paper_pickup.ogg
      params:
        volume: -4
  - type: EmitSoundOnDrop
    sound:
      path: /Audio/_RMC14/Handling/paper_drop.ogg
      params:
        volume: -5
  - type: EmitSoundOnLand
    sound:
      path: /Audio/_RMC14/Handling/paper_drop.ogg
      params:
        volume: -5
  - type: Tag
    tags:
    - RMCSkillPamphlet

# SKILLS


# gives medical skill
- type: entity
  parent: CMPamphlet
  id: CMPamphletMedical
  name: медичний довідник
  description: Тут описується те, як не витратити кілька років свого життя навчаючися на медичному.
  components:
  - type: Sprite
    state: pamphlet_medical
  - type: SkillPamphlet
    addSkills:
      RMCSkillMedical: 1
    skillCap:
      RMCSkillMedical: 1
    bypassLimit: true

