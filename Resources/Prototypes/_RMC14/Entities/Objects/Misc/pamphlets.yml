# gives spotter skill / bypasses limit
- type: entity
  parent: CMPamphlet
  id: CMPamphletSpotter
  name: довідник навідника
  description: Тут описується, як правильно дивитися в бінокль та наводити постріли снайпера.
  components:
  - type: Sprite
    state: pamphlet_spotter
  - type: SkillPamphlet
    bypassSkill: true
    addComps:
    - type: SpotterWhitelist
    addSkills:
      RMCSkillJtac: 2 # Sich. 1 в оригіналі
    skillCap:
      RMCSkillJtac: 3 # Mriya. 2 в оригіналі. RMC14: In case they read another one first.
    giveJobTitle: rmc-job-name-spotter
    givePrefix: rmc-job-prefix-spotter
    isAppendPrefix: false
    giveIcon:
      sprite: _RMC14/Interface/cm_job_icons.rsi
      state: hudsquad_ass
    giveMapBlip:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: spotter
    bypassLimit: false # Sich. Особливі ролі лише один раз
    jobWhitelists:
    - popup: rmc-pamphlets-rifleman-warning
      jobProto: CMRifleman
    - popup: rmc-pamphlets-rifleman-warning
      jobProto: CMPVERifleman

