# PENS

- type: entity
  parent: Pen
  id: CMPen
  name: ручка
  description: Це звичайна чорнильна ручка.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/paper.rsi
    state: pen
  - type: Item
    size: Tiny
    sprite: _RMC14/Objects/Misc/paper.rsi
    heldPrefix: pen
  - type: Clothing
    equippedPrefix: pen
    sprite: _RMC14/Objects/Misc/paper.rsi
    quickEquip: false
    slots:
    - Suitstorage
    - Ears
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 10

- type: entity
  parent: CMPen
  id: CMPenClicky # TODO RMC14 make it clicky
  name: ручка Ве-Я
  description: Ручка з надзвичайно приємним кліком, клікніть раз й вже ніколи не зможете перестати.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/paper.rsi
    state: weya_pen
  - type: Item
    sprite: _RMC14/Objects/Misc/paper.rsi

- type: entity
  parent: CMPen
  id: CMPenFountain
  name: перова ручка
  description: Ця авторучка, що є розкішним свідченням винахідливості майстерності інженерів ЕГІДА. Дизайн та функціональність були тут передусім. Деталізована позолотою та складною механікою, ручка дозволяє швидко змінювати безліч кольорів чорнила простим поворотом. Кожен механізм всередині ручки – є продуктом точної інженерії, розробленої для забезпечення плавного та легкого переходу використання, створюючи інструмент розкішної універсальності.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Misc/paper.rsi
    state: fountain_pen
  - type: Item
    sprite: _RMC14/Objects/Misc/paper.rsi
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-fountain-pen
