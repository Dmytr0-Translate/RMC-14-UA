- type: entity
  abstract: true
  parent: BaseItem
  id: CMPacketPills
  name: блістер для пігулок
  description: Містить пігуоки. Після того, як ви їх виймете – назад вже не повернути.
  components:
  - type: CMItemSlots
    count: 4
    slot:
      name: Pill
      whitelist:
        tags: []
  - type: RemoveOnlyStorage
  - type: Sprite
    sprite: _RMC14/Objects/Medical/pill_packets.rsi
    layers:
    - state: pill_packet
    - state: pill_packet_4
      map: [ "enum.CMItemSlotsLayers.Fill" ]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.CMItemSlotsLayers.Fill:
        enum.CMItemSlotsLayers.Fill:
          Empty: { state: pill_packet_4, visible: false }
          Low: { state: pill_packet_1, visible: true }
          Medium: { state: pill_packet_2, visible: true }
          High: { state: pill_packet_3, visible: true }
          Full: { state: pill_packet_4, visible: true }
  - type: Item
    size: Small
  - type: Tag
    tags:
    - PillPacket
  - type: IconLabel
    textColor: White
    storedOffset: -12, 12
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: Clothing
    quickEquip: false
    slots:
    - suitstorage

- type: Tag
  id: PillPacket

- type: entity
  parent: CMPacketPills
  id: CMPacketPillsTricordrazine
  name: блістер з пігулками трикодразину
  description: Цей блістер містить пігулки трикордазину. Їх використання допоможе пришвидшити загоєння більшості ран. Після виймання назад їх не вставити. Не приймайте більше 2 пігулок за короткий проміжок часу.
  components:
  - type: Sprite
    layers:
    - state: pill_packet
    - state: pill_packet_4
      map: [ "enum.CMItemSlotsLayers.Fill" ]
      color: "#d87f2b"
  - type: CMItemSlots
    startingItem: CMPillTricordrazine
  - type: IconLabel
    labelTextLocId: rmc-tricordazine-container-label-text

- type: entity
  parent: CMPacketPills
  id: CMPacketPillsBicaridine
  name: блістер з пігулками бікаридину
  description: Цей блістер містить пігулки бікаридину. Їх використання допоможе сильно пришвидшити загоєння фізичних травм. Після виймання назад їх не вставити. Не приймайте більше 2 пігулок за короткий проміжок часу.
  components:
  - type: Sprite
    layers:
    - state: pill_packet
    - state: pill_packet_4
      map: [ "enum.CMItemSlotsLayers.Fill" ]
      color: "#ed4847"
  - type: CMItemSlots
    startingItem: CMPillBicaridine
  - type: IconLabel
    labelTextLocId: rmc-bicaridine-container-label-text

- type: entity
  parent: CMPacketPills
  id: CMPacketPillsKelotane
  name: блістер з пігулками келотану
  description: Цей блістер містить пігулки келотану. Їх використання допоможе сильно пришвидшити загоєння опіків. Після виймання назад їх не вставити. Не приймайте більше 2 пігулок за короткий проміжок часу.
  components:
  - type: Sprite
    layers:
    - state: pill_packet
    - state: pill_packet_4
      map: [ "enum.CMItemSlotsLayers.Fill" ]
      color: "#f5e123"
  - type: CMItemSlots
    startingItem: CMPillKelotane
  - type: IconLabel
    labelTextLocId: rmc-kelotane-container-label-text

