- type: entity
  parent: RMCSynthResetKeySMART
  id: RMCSynthResetKeyMakeshift
  name: саморобний ключ синтетика
  description: Зроблений, як то кажуть, "з лайна та палок" ключ для перезавантаження синтетиків. Виглядає не дуже надійно, але схоже працює. Точно варто це пхати в машину за сотні тисяч, а то й мільйони доларів? Через високе енергоспоживання після кожного використання потрібно заряджати його.
  components:
  - type: Sprite
    layers:
    - state: makeshift_key
    - state: makeshift_key_on
      map: [ "enum.ToggleableVisuals.Layer" ]
      visible: false

