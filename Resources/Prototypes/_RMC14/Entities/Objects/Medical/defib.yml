- type: entity
  parent: BaseItem
  id: CMBaseDefibrillator
  name: екстрений дефібрилятор
  description: Дефібрилятор, який можна тримати однією рукою, основна його задача – це нормалізувати серцевий ритм пацієнта. За допомогою нього можна повертати людей з мертвих!
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Medical/defib.rsi
    layers:
    - state: defib
    - state: defib_on
      map: [ "enum.ToggleableVisuals.Layer" ]
      visible: false
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { visible: true }
          False: { visible: false }
  - type: Item
    size: Normal
    sprite: _RMC14/Objects/Medical/defib.rsi
    heldPrefix: defib
  - type: Speech
    speechVerb: Robotic
  - type: ItemToggle
    soundActivate:
      path: /Audio/_RMC14/Medical/defib_SafetyOn.ogg
    soundDeactivate:
      path: /Audio/_RMC14/Medical/defib_safetyOff.ogg
  - type: Defibrillator
    zapDelay: 0
    doAfterDuration: 4
    allowDoAfterMovement: false
    canDefibCrit: false
    rmcZapHeal:
    - Brute: -12
    - Burn: -12
    - Toxin: -12
    - Genetic: -12
    zapHeal:
      groups:
        Airloss: -400
    zapSound:
      path: /Audio/_RMC14/Medical/defib_release.ogg
      params:
        volume: -6
    chargeSound:
      path: /Audio/_RMC14/Medical/defib_charge.ogg
      params:
        volume: -8
    failureSound:
      path: /Audio/_RMC14/Medical/defib_failed.ogg
      params:
        volume: -6
    successSound:
      path: /Audio/_RMC14/Medical/defib_success.ogg
      params:
        volume: -6
    readySound:
      path: /Audio/_RMC14/Medical/defib_ready.ogg
      params:
        volume: -6
    zapDamage: 0
  - type: DoAfter
  - type: UseDelay
  - type: StaticPrice
    price: 100
  - type: GuideHelp
    guides:
    - RMCMedical
  - type: RequiresSkill
    skills:
      RMCSkillMedical: 2
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  id: CMDefibrillator
  parent: [CMBaseDefibrillator, RMCPowerCellSlotUnremovable]
  suffix: RMC14
  components:
  - type: PowerCellDraw
    enabled: false
    useRate: 66
  - type: RMCPowerUsageDisplay
  - type: UseOnSynthBlocked
    whitelist:
      components:
        - Marine

- type: entity
  id: CMDefibrillatorEmpty
  parent: CMDefibrillator
  suffix: RMC14, Розряджений
  components:
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default

- type: entity
  parent: CMBaseDefibrillator
  id: CMDefibrillatorInfinite
  suffix: RMC14, Нескінченний

- type: entity
  id: RMCDefibrillatorCompact
  parent: CMDefibrillator
  name: компактний дефібрилятор
  description: Цей дефібрилятор має вдвічі меншу ємність заряду порівняно зі стандартними моделями, зате без проблем влізе у вашу кишеню.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Medical/compact_defib.rsi
  - type: Item
    sprite: _RMC14/Objects/Medical/compact_defib.rsi
    size: Small
  - type: PowerCellDraw
    useRate: 132

# TODO RMC14: synth reset key sprites currently all use a makeshift_key placeholder.
# Replace them with original art that does not include Alien media logos.
- type: entity
  parent: [CMBaseDefibrillator, RMCPowerCellSlotUnremovable]
  id: RMCSynthResetKey
  name: ключ перезавантаження синтетика Ве-Я
  description: Цей пристрій може виправити серйозні збої чи програмні помилки у прошивці синтетів, а також перезапускати їх після аварійного завершення роботи. Через високе енергоспоживання після кожного використання потрібно заряджати його.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Devices/synth_reset_key.rsi
    layers:
    - state: reset_key
    - state: reset_key_on
      map: [ "enum.ToggleableVisuals.Layer" ]
      visible: false
  - type: PowerCellDraw
    enabled: false
    useRate: 1000
  - type: RMCPowerUsageDisplay
  - type: RequiresSkill
    skills:
      RMCSkillEngineer: 1
  - type: ItemToggle
    soundActivate:
      path: /Audio/_RMC14/Machines/click.ogg
    soundDeactivate:
      path: /Audio/_RMC14/Machines/click.ogg
  - type: Defibrillator
    zapSound:
      path: /Audio/_RMC14/Medical/reset_key_release.ogg
      params:
        volume: -6
    chargeSound:
      path: /Audio/_RMC14/Medical/reset_key_powerup.ogg
      params:
        volume: -8
    failureSound:
      path: /Audio/_RMC14/Medical/reset_key_shortbeep.ogg
      params:
        volume: -6
    successSound:
      path: /Audio/_RMC14/Medical/reset_key_boot_on.ogg
      params:
        volume: -6
  - type: UseOnSynthBlocked
    reversed: true
    popup: rmc-species-synth-reset-key-invalid
    whitelist:
      components:
        - Marine
  - type: Item
    size: Small
    sprite: _RMC14/Objects/Devices/synth_reset_key.rsi
    heldPrefix: null
  - type: Tag
    tags:
    - RMCSynthResetKey

- type: entity
  parent: RMCSynthResetKey
  id: RMCSynthResetKeySMART
  name: СМАРТ ключ перезавантаження синтетика Ве-Я
  description: Цей пристрій може виправити серйозні збої чи програмні помилки у прошивці синтетів, а також перезапускати їх після аварійного завершення роботи. Через високе енергоспоживання після кожного використання потрібно заряджати його. Цей пристрій має власний штучний інтелект, завдяки чому будь-хто може використовувати його без ризику пошкодити обладнання.
  components:
  - type: Sprite
    layers:
    - state: reset_key_ns
    - state: reset_key_ns_on
      map: [ "enum.ToggleableVisuals.Layer" ]
      visible: false
  - type: RequiresSkill
    skills:
      RMCSkillEngineer: 0

