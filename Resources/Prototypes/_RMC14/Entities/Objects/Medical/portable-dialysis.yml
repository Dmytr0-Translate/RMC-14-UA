- type: entity
  parent: [ BaseItem, RMCPowerCellSlotUnremovable ]
  id: RMCPortableDialysis
  name: портативний апарат для діалізу
  description: Портативний апарат для діалізу з невеликим внутрішнім акумулятором, який можна перезаряджати. Він фільтрує всі сторонні сполуки з кровотоку того, до кого його підключено, але також видаляє певну кількість крові.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Medical/portable_dialysis.rsi
    layers:
    - state: portadialysis
    - state: unhooked
      map: [ "enum.DialysisVisualLayers.Attachment" ]
    - state: draining
      map: [ "enum.DialysisVisualLayers.Effect" ]
      visible: false
    - state: filtering
      map: [ "enum.DialysisVisualLayers.Filtering" ]
      visible: false
    - state: battery0
      map: [ "enum.DialysisVisualLayers.Battery" ]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.DialysisVisuals.BatteryLevel:
        DialysisVisualLayers.Battery:
          Battery0: { state: battery0 }
          Battery15: { state: battery15 }
          Battery30: { state: battery30 }
          Battery45: { state: battery45 }
          Battery60: { state: battery60 }
          Battery85: { state: battery85 }
          Battery100: { state: battery100 }
  - type: Item
    size: Normal
  - type: PortableDialysis
    ripDamage:
      types:
        Piercing: 3
  - type: PowerCellDraw
    enabled: false
    drawRate: 10
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
