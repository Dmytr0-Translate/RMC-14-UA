- type: entity
  parent: CMFirstAidKit
  id: CMBurnAidKit
  name: аптечка при опіках
  description: Це набір екстреної медичної допомоги на випадок, якщо ви вирішили обійняти дуло працюючого кулемета або протестувати вогнемет на собі. Якщо ви достатньо досвідчені, то зможете вмістити це в сумку.
  components:
  - type: Sprite
    layers:
    - state: firefirstaid
    - state: kit_empty
      map: [ "openLayer" ]
      visible: false
  - type: Item
    heldPrefix: firefirstaid

- type: entity
  parent: CMBurnAidKit
  id: CMBurnAidKitFilled
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: CMHealthAnalyzer
    - id: CMOintment10
      amount: 2
    - id: CMKelotaneAutoInjector
      amount: 3
#    - id: CMPainStopAutoInjectorNoSkill

- type: entity
  parent: CMFirstAidKit
  id: CMFirstAidO2Kit
  name: аптечка при асфіксії
  description: Це набір екстреної медичної допомоги на випадок, якщо ви забули дихати (або втратили забагато крові). Якщо ви достатньо досвідчені, то зможете вмістити це в сумку.
  components:
  - type: Sprite
    layers:
    - state: o2
    - state: kit_empty
      map: [ "openLayer" ]
      visible: false
  - type: Item
    heldPrefix: o2

- type: entity
  parent: CMFirstAidO2Kit
  id: CMFirstAidO2KitFilled
  suffix: Заповнено
  components:
  - type: StorageFill
    contents:
    - id: CMHealthAnalyzer
    - id: CMPillDexalin
      amount: 2
    - id: CMDexalinPlusAutoInjector
      amount: 3
    - id: CMInaprovalineAutoInjector

