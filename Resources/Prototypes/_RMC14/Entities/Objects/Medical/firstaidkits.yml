- type: entity
  parent: BaseStorageItem
  id: CMFirstAidKit
  name: аптечка
  description: Екстрений медичний набір, що допоможе будь-яких ваших бо-бо. Для використання вмісту не потрібні медичні навички. Якщо ви достатньо досвідчені, то зможете вмістити це в сумку.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Medical/first_aid_kits.rsi
    layers:
    - state: firstaid
    - state: kit_empty
      map: [ "openLayer" ]
      visible: false
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,13,1 # 7 slots
    whitelist:
      tags:
      - CMMedicalUpgradeKit
      - DiscreteHealthAnalyzer
      - Dropper
      - Pill
      - PillPacket
      - Bottle
      - Syringe
      - PillCanister
      - CMTraumaKit
      - CMBurnKit
      - Ointment
      - CMOintment
      - Brutepack
      - Bloodpack
      #      - TODO RMC14 splint
      - RMCPenlight
      - CMAutoInjector
      - RMCSyringeCase
      - CMSurgicalLine
      - CMSynthGraft
      - CMRollerItem
      - BodyBag
      - Hypospray
      - CMBloodPack
      - CMSurgicalCase
      components:
      - Hypospray
  - type: Item
    size: Normal
    sprite: _RMC14/Objects/Medical/first_aid_kits.rsi
    heldPrefix: firstaid
  - type: Tag
    tags:
    - CMFirstAidKit
  - type: GenericVisualizer
    visuals:
      enum.SharedBagOpenVisuals.BagState:
        openLayer:
          Open: { visible: true }
          Closed: { visible: false }
  - type: Appearance
  - type: IgnoreContentsSize
    items:
      tags:
      - CMMedicalUpgradeKit
      - PillPacket
      - PillCanister
      - CMSurgicalCase
      - RMCSyringeCase
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: StorageNestedOpenSkillRequired
    skills:
      all:
        RMCSkillMedical: 2
  - type: PhysicalComposition
    materialComposition:
      RMCPlastic: 2000

- type: entity
  parent: CMFirstAidKit
  id: CMFirstAidKitSurgery
