    grid:
    - 0,0,13,1 # 7 slots
    whitelist:
      tags:
      - DiscreteHealthAnalyzer
      - Dropper
      - Pill
      - Bottle
      - Syringe
      - PillCanister
      - CMTraumaKit
      - CMBurnKit
      - Ointment
      - CMOintment
      - Brutepack
      - Bloodpack
      #      - TODO RMC14 splint
      - RMCPenlight
      - CMAutoInjector
      - RMCSyringeCase
      - CMSurgicalLine
      - CMSynthGraft
      - CMRollerItem
      - BodyBag
      - Hypospray
      - CMBloodPack
      - CMSurgicalCase
      components:
      - Hypospray
      - CMSurgeryTool

