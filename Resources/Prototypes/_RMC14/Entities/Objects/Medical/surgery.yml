# Base
- type: entity
  parent: BaseToolSurgery
  id: CMBaseToolSurgery
  abstract: true
#  name: retractor – Sich
#  description: Retracts stuff. – Sich
  components:
  - type: Item
    size: Small
  - type: CMSurgeryTool
  - type: Clothing
    quickEquip: false
    slots:
    - suitstorage
  - type: StaticPrice
    price: 24

# Retractor
- type: entity
  parent: CMBaseToolSurgery
  id: CMRetractor
  name: ретрактор
  description: Ранорозширювач, який по формі нагадує дивні ножиці. Медичний інструмент, який використовується для, відповідно, розширення/відсунення м'яких тканин, щоб спростити доступ до того, що за ними.
  components:
  - type: CMSurgeryTool
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/retractor1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/retractor2.ogg
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/retractor.rsi
    state: retractor
  - type: Item
    sprite: _RMC14/Objects/Medical/Surgery/retractor.rsi
  - type: CMRetractor
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 10000
      CMGlass: 5000

# - Predator
- type: entity
  parent: CMRetractor
  id: CMRetractorPredator
  name: відкривачка
  components:
  - type: Sprite
    state: predator_retractor



# Hemostat
- type: entity
  parent: CMBaseToolSurgery
  id: CMHemostat
  name: гемостат
  description: Хірургічний затискач, який по формі нагадує ножиці. Медичний інструмент, який використовується для фізичного перекриття/затискання судин, задля запобігання кровотечі.
  components:
  - type: CMSurgeryTool
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/hemostat1.ogg
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
    state: hemostat
  - type: Item
    sprite: _RMC14/Objects/Medical/Surgery/hemostat.rsi
  - type: CMHemostat
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 5000
      CMGlass: 2500

# - Predator
- type: entity
  parent: CMHemostat
  id: CMHemostatPredator
  name: пінчер
  components:
  - type: Sprite
    state: predator_hemostat



# Cautery
- type: entity
  parent: CMBaseToolSurgery
  id: CMCautery
  name: припікач
  description: Пристрій схожий на ручку з лазером на кінці. Медичний інструмент, який використовується для "запаювання" ран та порізів, задля запобігання кровотечі.
  components:
  - type: CMSurgeryTool
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/cautery1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/cautery2.ogg
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/cautery.rsi
    state: cautery
  - type: Item
    size: Tiny
    sprite: _RMC14/Objects/Medical/Surgery/cautery.rsi
  - type: MeleeWeapon
    damage:
      types:
        Heat: 5
    soundHit:
      path: /Audio/Effects/lightburn.ogg
  - type: CMCautery
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 5000
      CMGlass: 2500

# - Predator
- type: entity
  parent: CMCautery
  id: CMCauteryPredator
  name: випалювач
  components:
  - type: Sprite
    state: predator_cautery



# Surgical drill
- type: entity
  parent: CMBaseToolSurgery
  id: CMSurgicalDrill
  name: хірургічний дриль
  description: Дриль є дриль, але малий та обережний. Медичний інструмент, який використовується для свердління чи розрізання кісток.
  components:
  - type: CMSurgeryTool
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/saw.ogg
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/drill.rsi
    state: drill
  - type: Item
    sprite: _RMC14/Objects/Medical/Surgery/drill.rsi
  - type: MeleeWeapon
    damage:
      types:
        Piercing: 10
    soundHit:
      path: /Audio/Items/drill_hit.ogg
  - type: CMSurgicalDrill
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 15000
      CMGlass: 10000
  - type: StaticPrice
    price: 40

# - Bonedrill
- type: entity
  parent: CMSurgicalDrill
  id: CMSurgicalDrillPredator
  name: дриль для кісток
  components:
  - type: Sprite
    state: predator_drill



# Scalpel
- type: entity
  parent: CMBaseToolSurgery
  id: CMScalpel
  name: скальпель
  description: Малий ніж. Медичний інструмент, який використовується для розрізання м'яких тканин. Ріж, ріж й ще раз ріж!
  components:
  - type: CMSurgeryTool
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/scalpel1.ogg
    endSound:
      path: /Audio/_RMC14/Medical/Surgery/scalpel2.ogg
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
    state: scalpel
  - type: Item
    size: Tiny
    sprite: _RMC14/Objects/Medical/Surgery/scalpel.rsi
  - type: Sharp
    butcherDelayModifier: 1.5
  - type: Utensil
    types:
    - Knife
  - type: MeleeWeapon
    wideAnimationRotation: 90
    swingLeft: true
    attackRate: 1.5
    damage:
      types:
        Slash: 8
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: CMScalpel
  - type: Tag
    tags:
    - RMCScalpel
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 10000
      CMGlass: 5000

# - Predator
- type: entity
  parent: CMScalpel
  id: CMScalpelPredator
  name: різак
  components:
  - type: Sprite
    state: predator_scalpel

# - Laser
- type: entity
  parent: CMScalpel
  id: CMScalpelLaser
  name: прототип лазерного скальпеля
  description: Скальпель, доповнений лазером, для зупинки кровотечі під час розрізу. Відповідно, також функціонує як припікач. Цей виглядає, як ненадійна рання модель.
  components:
  - type: Sprite
    layers:
    - state: scalpel_laser
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: MeleeWeapon
    damage:
      types:
        Slash: 0
  - type: ItemToggle
    predictable: false
  - type: ItemToggleHot
  - type: UseDelay
  - type: ItemToggleMeleeWeapon
    activatedDamage:
      types:
        Slash: 14
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { state: scalpel_laser_on }
          False: { state: scalpel_laser }

# - - Improved
- type: entity
  parent: CMScalpelLaser
  id: CMScalpelLaserImproved
  name: лазерний скальпель
  description: Скальпель, доповнений лазером, для зупинки кровотечі під час розрізу. Відповідно, також функціонує як припікач. Цей виглядає надійним, хоча міг би бути кращим.
  components:
  - type: Sprite
    layers:
    - state: scalpel_laser_2
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { state: scalpel_laser_2_on }
          False: { state: scalpel_laser_2 }

# - - Advanced
- type: entity
  parent: CMScalpelLaser
  id: CMScalpelLaserAdvanced
  name: просунутий лазерний скальпель
  description: Скальпель, доповнений лазером, для зупинки кровотечі під час розрізу. Відповідно, також функціонує як припікач. Цей інструмент виглядає, як вершина високотоного лазерного хірургічного обладнання!
  components:
  - type: Sprite
    layers:
    - state: scalpel_laser_3
      map: [ "enum.ToggleableVisuals.Layer" ]
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: { state: scalpel_laser_3_on }
          False: { state: scalpel_laser_3 }

# - Pict System
- type: entity
  parent: CMScalpel
  id: CMScalpelPICT
  name: система ІПРК
  description: Інструмент для Прецизійного Розрізу та Каутеризації. Використовує високочастотне вібруюче лезо, лазерний припікач та систему контролю всмоктування рідини для точного розрізання цільових тканин, запобігаючи крововтраті. Незважаючи на проблемну програму розробки та космічну ціну, окрім складних експериментальних операцій, він нічим не кращий за звичайний скальпель і не може створити повнорозмірний розріз без крові.
  components:
  - type: Sprite
    state: pict_system

# - Manager
- type: entity
  parent: CMScalpel
  id: CMScalpelManager
  name: система управління розрізами
  description: Справжнє продовження тіла хірурга. Це диво дозволяє миттєво робити розрізи, переходячи відразу до основної справи.
  components:
  - type: Sprite
    state: scalpel_manager



# Circular saw
- type: entity
  parent: CMBaseToolSurgery
  id: CMCircularSaw
  name: циркулярна пилка
  description: Схожа на дриль з малим та тонким наконечником. Медичний інструмент, який використовується для більш обережного та точного розрізання/прибирання кісткової тканини, ніж це б зробила дриль.
  components:
  - type: CMSurgeryTool
    startSound:
      path: /Audio/_RMC14/Medical/Surgery/saw.ogg
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/saw.rsi
    state: saw
  - type: Item
    sprite: _RMC14/Objects/Medical/Surgery/saw.rsi
  - type: MeleeWeapon
    damage:
      groups:
        Brute: 15
    soundHit:
      path: /Audio/Items/drill_hit.ogg
  - type: Tool
    qualities:
    - Sawing
    speedModifier: 1.5
  - type: CMBoneSaw
  - type: PhysicalComposition
    materialComposition:
      CMSteel: 20000
      CMGlass: 10000
  - type: StaticPrice
    price: 47

# - Predator
- type: entity
  parent: CMCircularSaw
  id: CMCircularSawPredator
  name: пила для кісток
  components:
  - type: Sprite
    state: predator_bonesaw



