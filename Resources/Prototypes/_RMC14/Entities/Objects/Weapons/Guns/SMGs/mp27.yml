- type: entity
  parent: CMBaseWeaponSMG
  name: МП27 пістолет-кулемет
  id: RMCWeaponSMGMP27
  description: Архаїчна конструкція, якій вже майже вік, МП27 був поширений в давні часи. Сьогодні обмежено використовується як дешеві кустарні репліки або сімейні реліквії. Надзвичайно ергономічна та легка конструкція забезпечує легке масове виробництво та, що дивно, зручне використання, але дешеві матеріали помітно зменшують розкид зброї.
  suffix: Filled
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/SMGs/mp27.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/SMGs/mp27.rsi
  - type: Gun
    shotsPerBurst: 2
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_mp27.ogg
      params:
        volume: -1
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    - FullAuto
    recoilWielded: 0.1
    recoilUnwielded: 1
    scatterWielded: 15
    scatterUnwielded: 16
    baseFireRate: 6.66
    burstScatterMult: 3.5
    modifiers:
      Burst:
        fireDelay: 0.0999
        maxScatterModifier: 10
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 6
      FullAuto:
        maxScatterModifier: 3
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 4
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1
    accuracyMultiplierUnwielded: 0.9
  - type: MagazineAmmoProvider
    autoEject: false
    soundAutoEject: null
  - type: WieldableSpeedModifiers
    base: 0.725
    light: 1
    medium: 1
    heavy: 1
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: RMCMagazineSMGMP27
        insertSound: /Audio/_RMC14/Weapons/Guns/Reload/smg_reload.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/smg_unload.ogg
        priority: 2
        whitelist:
          tags:
          - RMCMagazineSMGMP27
          - RMCMagazineSMGMP27Extend
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentBarrelCharger
          - RMCAttachmentExtendedBarrel
          - RMCAttachmentRecoilCompensator
          - RMCAttachmentExtendedCompensator
          - RMCAttachmentSuppressor
          - RMCAttachmentSuppressorCompact
          - RMCM5Bayonet
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentMagneticHarness
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS5MicroRedDotSight
          - RMCAttachmentS6ReflexSight
          - RMCAttachmentS42xTelescopicMiniscope
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - RMCAttachmentLaserSight
          - RMCAttachmentGyroscopicStabilizer
          - RMCAttachmentBipod
          - RMCAttachmentBurstFireAssembly
          - RMCAttachmentUnderbarrelExtinguisher
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.840, 0.02
      rmc-aslot-rail: 0.06, 0.09
      rmc-aslot-underbarrel: 0.465, -0.31
  - type: GunDamageModifier
    multiplier: 1

- type: entity
  parent: CMMagazineRifleBase
  id: RMCMagazineSMGMP27
  name: МП27 магазин (4.6х30 мм)
  description: Магазин з набоями калібру 4,6 мм для МП27. Стріляє великими, важкими кулями, які мають помітну для пістолета-кулемета ударну силу, але також мають такий самий помітний розкид та втрату точності.
  components:
  - type: Tag
    tags:
    - CMMagazineSmg
    - RMCMagazineSMGMP27
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridge46x30mm
    proto: RMCCartridge46x30mm
    capacity: 30
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/mp27.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
    zeroOnlyOnEmpty: true
  - type: Appearance
  - type: Item
    size: Small

- type: entity
  parent: RMCMagazineSMGMP27
  id: RMCMagazineSMGMP27Extend
  name: МП27 розширений магазин (4.6х30 мм)
  description: Магазин збільшеного об'єму з набоями калібру 4,6 мм для МП27. Стріляє великими, важкими кулями, які мають помітну для пістолета-кулемета ударну силу, але також мають такий самий помітний розкид та втрату точності.
  components:
  - type: Tag
    tags:
    - CMMagazineSmg
    - RMCMagazineSMGMP27
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridge46x30mm
    proto: RMCCartridge46x30mm
    capacity: 40
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/mp27extend.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: Item
    size: Small

- type: entity
  parent: CMCartridge10x20mm
  id: RMCCartridge46x30mm
  name: набій (4.6х30 мм)
  description: Набій калібру 4,6 мм для пістолета-кулемета МП27.
  components:
  - type: Tag
    tags:
    - Cartridge
    - RMCCartridge46x30mm
  - type: CartridgeAmmo
    proto: RMCBullet46x30mm

- type: entity
  parent: Bullet10x20mm
  id: RMCBullet46x30mm
