  - type: Tag
    tags:
    - RMCAttachmentStock
    - RMCAttachmentXM51Stock
  - type: AttachableSpeedMods
    modifiers:
    - conditions:
        wieldedOnly: true
      walk: -0.059
      sprint: -0.101
  - type: AttachableWieldDelayMods
    modifiers:
    - delay: 0.4
  - type: AttachableWeaponMeleeMods
    modifiers:
    - bonusDamage:
        types:
          Blunt: 10
  - type: AttachableWeaponRangedMods
    fireModeMods:
