- type: entity
  abstract: true
  parent: RMCAttachableBase
  id: RMCRailAttachmentBase
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Attachments/rail.rsi
  - type: Tag
    tags:
    - RMCAttachmentRail

- type: entity
  parent: [ RMCRailAttachmentBase, RMCAttachableToggleableBase ]
  id: RMCAttachmentRailFlashlight
  name: рейковий ліхтар
  description: Ліхтар для кріплення на рейку зброї. Може вмикатися та вимикатися. Забезпечує кращий рівень освітлення порівняно зі стандартними ліхтарями броні М3.
  components:
  - type: ItemTogglePointLight
  - type: ToggleableVisuals
    spriteLayer: light
  - type: PointLight
    enabled: false
    radius: 5
    softness: 5
    autoRot: true
    netsync: false
  - type: HandheldLight
    addPrefix: false
    blinkingBehaviourId: blinking
    radiatingBehaviourId: radiating
  - type: NoHandsInteractionBlocked
  - type: LightBehaviour
    behaviours:
    - !type:FadeBehaviour
      id: radiating
      interpolate: Linear
      maxDuration: 2.0
      startValue: 3.0
      endValue: 2.0
      isLooped: true
      property: Radius
      enabled: false
      reverseWhenFinished: true
    - !type:PulseBehaviour
      id: blinking
      interpolate: Nearest
      maxDuration: 1.0
      minValue: 0.1
      maxValue: 2.0
      isLooped: true
      property: Radius
      enabled: false
  - type: Battery
    maxCharge: 10
    startingCharge: 10
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 3
  - type: Sprite
    layers:
    - state: flashlight
    - state: flashlight-on
      shader: unshaded
      visible: false
      map: [ "light" ]
  - type: Item
    sprite: _RMC14/Objects/Weapons/Guns/Attachments/rail.rsi
  - type: Appearance
  - type: AttachableToggleable
    attachedOnly: true
    useDelay: 1.0
    icon:
      sprite: _RMC14/Objects/Weapons/Guns/Attachments/rail.rsi
      state: flashlight
    iconActive:
      sprite: _RMC14/Objects/Weapons/Guns/Attachments/rail.rsi
      state: flashlight-on
    actionName: Toggle Rail Flashlight
    actionDesc: Can be toggled on and off. A better light source than standard M3 pattern armor lights.
  - type: AttachableVisuals
    showActive: true
  - type: AttachableToggleableSimpleActivate
  - type: Tag
    tags:
    - RMCAttachmentRail
    - RMCAttachmentRailFlashlight
    - Flashlight
  - type: Construction
    graph: RMCFlashLightGraph
    node: RailLight

- type: entity
  parent: RMCRailAttachmentBase
  id: RMCAttachmentMagneticHarness
  name: магнітне кріплення
  description: Комплект магнітного кріплення, що фіксується на рейці зброї та автоматично причеплюється до броні з відповідним кріпленням. У разі падіння зброя автоматично закріпиться на броню. Ідеальний вибір, якщо ви любите губите зброю.
  components:
  - type: Sprite
    state: magnetic
  - type: Tag
    tags:
    - RMCAttachmentRail
    - RMCAttachmentMagneticHarness
  - type: AttachableMagnetic
  - type: AttachableVisuals
  - type: AttachableWeaponRangedMods
    modifiers:
    - accuracyAddMult: -0.05

- type: entity
  parent: RMCAttachmentMagneticHarness
  id: RMCAttachmentTwoPointSling # PVE
  name: двоточкова стропа
  description: Традиційна смужка міцної нейлонової тканини із затискачами на обох кінцях. Використовується для кріплення зброї до броні, зазвичай використовується підрозділами ОН.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Attachments/rifle_sling/classic-desert-jungle.rsi
    state: pve-sling
  - type: AttachableMagnetic
  - type: AttachableVisuals
  - type: AttachableWeaponRangedMods
    modifiers:
    - conditions:
        unwieldedOnly: true
      accuracyAddMult: 0.05
      recoilFlat: -4
      scatterFlat: -10
  - type: Appearance
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Weapons/Guns/Attachments/rifle_sling/classic-desert-jungle.rsi
      Desert: _RMC14/Objects/Weapons/Guns/Attachments/rifle_sling/classic-desert-jungle.rsi
      Snow: _RMC14/Objects/Weapons/Guns/Attachments/rifle_sling/snow-urban.rsi
      Classic: _RMC14/Objects/Weapons/Guns/Attachments/rifle_sling/classic-desert-jungle.rsi
      Urban: _RMC14/Objects/Weapons/Guns/Attachments/rifle_sling/snow-urban.rsi


- type: entity
  parent: RMCRailAttachmentBase
  id: RMCAttachmentS5RedDotSight
  name: С5 приціл з червоною крапкою
  description: Універсальний коліматорний приціл, відомий як "AN/PVQ-64 Dot Sight". Оснащений сонцезахисним козирком для покращення видимості у яскравих умовах і стійкості до погодних впливів. Компактний і ефективний, приклад військового дизайну... Але, насправді – це просто масовий комерційний продукт із наклеєною військовою назвою. Краще придивіться до моделі С6.
  components:
  - type: Sprite
    state: reddot
  - type: Tag
    tags:
    - RMCAttachmentRail
    - RMCAttachmentS5RedDotSight
  - type: AttachableVisuals
  - type: AttachableWeaponRangedMods
    modifiers:
    - conditions:
        wieldedOnly: true
      accuracyAddMult: 0.2
    - conditions:
        unwieldedOnly: true
      accuracyAddMult: 0.05
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-s5-red-dot-sight

- type: entity
  parent: RMCRailAttachmentBase
  id: RMCAttachmentS5MicroRedDotSight
  name: С5-мікро приціл з червоною крапкою
  description: Легкий, низькопрофільний точковий оптичний приціл, розроблений для легшого прицілення за умови мінімальної ваги. Оптимізований для пістолетів-кулеметів та іншої зброї, він ідеально підходить для ближнього бою, де швидкість та спритність мають найбільше значення.
  components:
  - type: Sprite
    state: reddot_small
  - type: Tag
    tags:
    - RMCAttachmentRail
    - RMCAttachmentS5MicroRedDotSight
  - type: AttachableVisuals
  - type: AttachableWeaponRangedMods
    modifiers:
    - conditions:
        wieldedOnly: true
      accuracyAddMult: 0.15
    - conditions:
        unwieldedOnly: true
      accuracyAddMult: 0.05

- type: entity
  parent: RMCRailAttachmentBase
  id: RMCAttachmentS6ReflexSight # reflex
  name: С6 рефлекторний приціл
  description: Рефлекторний приціл ЕГІДА С6. Альтернатива прицілам з нульовим збільшенням з більш відкритим оптичним вікном порівняно з прицілом С5. Допомагає зменшити розсіювання під час автоматичної стрільби. Якщо у вас гвинтівка – краще беріть його.
  components:
  - type: Sprite
    state: reflex
  - type: Tag
    tags:
    - RMCAttachmentRail
    - RMCAttachmentS6ReflexSight
  - type: AttachableVisuals
  - type: AttachableWeaponRangedMods
    modifiers:
    - conditions:
        wieldedOnly: true
      accuracyAddMult: 0.15
      scatterFlat: -2
      burstScatterAddMult: -1
    - conditions:
        unwieldedOnly: true
      accuracyAddMult: 0.05
  - type: RMCLoreExaminable
    content: rmc-lore-examinable-s6-reflex-sight

