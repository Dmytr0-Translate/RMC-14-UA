- type: entity
  parent: [RMCBaseSlideMagazineVisualsBallistic, RMCWeaponRevolverBase]
  id: RMCWeaponRevolverMateba
  name: кастомний револьвер Матеба # Sich Мають інший формат назви, бо зброя КО
  description: Авторевольвер .454 Матеба 6 Уніка — це напівавтоматична ручна гармата, яка використовує власну віддачу для обертання барабану. Надзвичайно рідкісний, непомірно дорогий та неймовірно потужний, зазвичай його використовують старші офіцери КМПОН. Стильний, вишуканий й, перш за все, надзвичайно смертоносний.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/mateba/jungle.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/mateba/jungle.rsi
  - type: Gun
    shotsPerBurst: 3
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    - Burst
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_mateba.ogg
  - type: Tag
    tags:
    - Sidearm
    - RMCRevolver
    - RMCMateba
  - type: Corrodible
    isCorrodible: false
  - type: RevolverAmmoProvider
    whitelist:
      tags:
      - RMCSpeedLoaderMateba
      - RMCSpeedLoaderMatebaHE
      - RMCSpeedLoaderMatebaHIAP
      - RMCSpeedLoaderMatebaHighImpact
      - RMCCartridgeRevolverMatebaHE
      - RMCCartridgeRevolverMatebaHIAP
      - RMCCartridgeRevolverMatebaHighImpact
      - RMCCartridgeRevolverMateba
    proto: RMCCartridgeRevolverMatebaHighImpact
    capacity: 6
    chambers: [ True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null ]
  - type: GunDamageModifier
    multiplier: 1.5
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    - Burst
    recoilWielded: 4
    recoilUnwielded: 4
    baseFireRate: 1.111
    scatterWielded: 8
    scatterUnwielded: 20
    burstScatterMult: 5
    burstFireRateMultiplier: 3 #This + 0.1332 = perfect
    modifiers:
      Burst:
        fireDelay: 0.1332 #0.2664
        maxScatterModifier: 10
        useBurstScatterMult: true
        unwieldedScatterMultiplier: 2
        shotsToMaxScatter: 6
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.1
    accuracyMultiplierUnwielded: 0.75
  - type: Appearance
  - type: AttachableHolder
    slots:
      rmc-bslot-barrel:
        startingAttachable: RMCAttachmentMatebaStandard
        whitelist:
          tags:
          - RMCAttachmentMatebaStandard
          - RMCAttachmentMatebaMarksman
          - RMCAttachmentMatebaSnubNose
      rmc-aslot-barrel:
       whitelist:
          tags:
          - RMCAttachmentRecoilCompensator
          - RMCAttachmentBarrelCharger
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS5MicroRedDotSight
          - RMCAttachmentS6ReflexSight
  - type: AttachableHolderVisuals
    offsets:
      rmc-bslot-barrel: 0.215, 0.19
      rmc-aslot-barrel: 0.215, 0.19
      rmc-aslot-rail: -0.11, 0.22
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Weapons/Guns/Pistols/mateba/jungle.rsi
      Desert: _RMC14/Objects/Weapons/Guns/Pistols/mateba/desert.rsi
      Snow: _RMC14/Objects/Weapons/Guns/Pistols/mateba/snow.rsi
      Classic: _RMC14/Objects/Weapons/Guns/Pistols/mateba/classic.rsi
      Urban: _RMC14/Objects/Weapons/Guns/Pistols/mateba/urban.rsi
  - type: RMCAirShot
    preparationTime: 1.5
    requiresCombat: true
    doAfterBreakOnMove: false
    ignoreRoof: true
    shakeAmount: 5
    requiredSkills:
      RMCSkillLeadership: 3
