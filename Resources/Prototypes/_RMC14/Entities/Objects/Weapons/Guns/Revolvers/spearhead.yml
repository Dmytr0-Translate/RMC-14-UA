- type: entity
  parent: [RMCBaseSlideMagazineVisualsBallistic, RMCWeaponRevolverBase]
  id: RMCWeaponRevolverSpearhead
  name: БКМ 'Вістря Списа' револьвер
  description: Масивний автоматичний револьвер, який найчастіше зустрічається в представників БКМ та в колоніях, якими вони займаються. Стріляє кулями .357. # Sich. Оригінальний опис був копією від М44, тож трошки логіки додано
  components:
  - type: Tag
    tags:
    - Sidearm
    - RMCRevolver
    - RMCWeaponRevolverSpearhead
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/spearhead.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/spearhead.rsi
  - type: RevolverAmmoProvider
    whitelist:
      tags:
      - RMCSpeedLoader357
      - RMCSpeedLoader357Hollowpoint
      - RMCCartridgeRevolver357
      - RMCCartridgeRevolver357Hollowpoint
    proto: RMCCartridgeRevolver357
    capacity: 6
    chambers: [ True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null ]
  - type: Gun
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      collection: RMCCMBSpearheadShoot
    soundEmpty:
      path: /Audio/_RMC14/Weapons/Guns/gun_cmb_click1.ogg
  - type: RMCSelectiveFire
    baseFireModes:
    - SemiAuto
    recoilWielded: 1
    recoilUnwielded: 3
    scatterWielded: 8
    scatterUnwielded: 12
    baseFireRate: 1.67
    burstScatterMult: 4
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        whitelist:
          tags:
          - RMCAttachmentRecoilCompensator
          - RMCAttachmentExtendedCompensator
          - RMCAttachmentBarrelCharger
          - RMCAttachmentExtendedBarrel
          - RMCAttachmentSuppressor
          - RMCAttachmentSuppressorCompact
      rmc-aslot-rail:
        whitelist:
          tags:
          - RMCAttachmentRailFlashlight
          - RMCAttachmentS5RedDotSight
          - RMCAttachmentS5MicroRedDotSight
          - RMCAttachmentS6ReflexSight
          - RMCAttachmentS42xTelescopicMiniscope
      rmc-aslot-stock:
        whitelist:
          tags:
          - RMCAttachmentM44MagnumSharpshooterStock
      rmc-aslot-underbarrel:
        whitelist:
          tags:
          - RMCAttachmentLaserSight
          - RMCAttachmentGyroscopicStabilizer
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-barrel: 0.75, 0.1
      rmc-aslot-rail: -0.14, 0.158
      rmc-aslot-stock: -0.59375, 0.09375
      rmc-aslot-underbarrel: 0.38, -0.24

- type: entity
  parent: RMCWeaponRevolverSpearhead
  id: RMCWeaponRevolverSpearheadTactitcal
  components:
  - type: AttachableHolder
    slots:
      rmc-aslot-barrel:
        startingAttachable: RMCAttachmentExtendedBarrel
      rmc-aslot-rail:
        startingAttachable: RMCAttachmentS6ReflexSight
      rmc-aslot-underbarrel:
        startingAttachable: RMCAttachmentLaserSight

