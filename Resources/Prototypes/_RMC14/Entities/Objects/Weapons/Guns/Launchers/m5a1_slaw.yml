- type: entity
  parent: RMCBaseWeaponLauncher
  id: RMCWeaponLauncherDisposable
  name: М5А1 СЛАВ # Sich. SLAW – Shoulder Launched Assault Weapon. . . Трансліт в студію!
  suffix: AP
  description: М5А1 СЛАВ – це легка однозарядна плечова пускова протитанкова установка, здатна вражати ворожу техніку на відстані до 1000 м. Вона повністю одноразова, її викидають після пострілу. Система СЛАВ складається з водонепроникної вуглецево-композитної детонаційної труби, всередині якої знаходиться алюмінієва пускова труба з ракетою. Прицілювання та постріл здійснюються з плеча. Схоже, це якась "цивільна" версія з сильно обмеженою дальністю та відірваним прицілом... Майте це на увазі!
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/RocketLaunchers/m5a1_disposable.rsi
    layers:
      - state: icon
        map: ["enum.GunVisualLayers.Base"]
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/RocketLaunchers/m5a1_disposable.rsi
  - type: Item
    sprite: _RMC14/Objects/Weapons/Guns/RocketLaunchers/m5a1_disposable.rsi
  - type: BallisticAmmoProvider
    proto: RMCRocket84mmAntiArmor
    cycleable: false
    whitelist:
      tags: []
  - type: RMCFoldableGun
    foldDelay: 2
    foldText: rmc-gun-foldable-launcher-fold-self
    foldTextOthers: rmc-gun-foldable-launcher-fold-others
    finishText: rmc-gun-foldable-launcher-fold-finish-self
    finishTextOthers: rmc-gun-foldable-launcher-fold-finish-others
    toggleFoldSound:
      path: /Audio/_RMC14/Weapons/Handling/component_pickup.ogg
      params:
        variation: 0.2
    foldedEntity: RMCWeaponLauncherDisposableFolded

- type: entity
  parent: [BaseItem, RMCBaseMeleeWeapon]
  id: RMCWeaponLauncherDisposableFolded
  name: М5А1 СЛАВ
  description: Протитанкова РПГ М5А1 СЛАВ, складена для легшого зберігання.
  suffix: AP, folded
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/RocketLaunchers/m5a1_disposable.rsi
    state: icon-folded
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/RocketLaunchers/m5a1_disposable.rsi
    equippedPrefix: folded
    quickEquip: false
    slots:
    - suitStorage
  - type: Item
    sprite: _RMC14/Objects/Weapons/Guns/RocketLaunchers/m5a1_disposable.rsi
    heldPrefix: folded
    size: Normal
  - type: RMCFoldableGun
    foldDelay: 4
    foldText: rmc-gun-foldable-launcher-unfold-self
    foldTextOthers: rmc-gun-foldable-launcher-unfold-others
    finishText: rmc-gun-foldable-launcher-unfold-finish-self
    finishTextOthers: rmc-gun-foldable-launcher-unfold-finish-others
    toggleFoldSound:
      path: /Audio/_RMC14/Weapons/Handling/component_pickup.ogg
      params:
        variation: 0.2
    foldedEntity: RMCWeaponLauncherDisposable
    examineText: rmc-gun-foldable-launcher-examine-unfold
    onActivate: true
  - type: EmitSoundOnPickup
    sound:
      collection: RMCEquipGun
      params:
        volume: -6
  - type: EmitSoundOnDrop
    sound:
      collection: RMCRustleGun
      params:
        volume: -4
  - type: EmitSoundOnLand
    sound:
      collection: RMCRustleGun
      params:
        volume: -4
  - type: MeleeWeapon
    attackRate: 1
    damage:
      types:
        Blunt: 5
    soundHit:
      collection: GenericHit

