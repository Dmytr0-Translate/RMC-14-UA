- type: entity
  parent: CMWeaponPistolBase
  id: RMCWeaponPistolPK7
  name: ПК-7 електростатичний пістолет
  description: Пістолет виробництва Вестон-Ямада під нелетальне усунення цілей. Спочатку виготовлений у 2080-х роках, електростатичний пістолет ПК-7 стріляє електрично зарядженими кулями з високою точністю, хоча його вартість та постійна потреба в чищенні роблять його рідкісним явищем.
  components:
  - type: Tag
    tags:
    - Sidearm
    - RMCWeaponPistolPK7
  - type: Gun
    soundGunshot:
      path: /Audio/_RMC14/Weapons/Guns/Gunshots/gun_es4.ogg
  - type: RMCSelectiveFire
    recoilWielded: 1
    recoilUnwielded: 3
    scatterWielded: 4
    scatterUnwielded: 4
    baseFireRate: 4
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/pk7.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Weapons/Guns/Pistols/pk7.rsi
  - type: RMCWeaponAccuracy
    accuracyMultiplier: 1.2
  - type: ItemSlots
    slots:
     gun_magazine:
       name: Magazine
       insertSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_mk80_reload.ogg
       ejectSound: /Audio/_RMC14/Weapons/Guns/Reload/gun_88m4_unload.ogg
       priority: 2
       whitelist:
         tags:
          - RMCMagazinePistolPK7
       startingItem: RMCMagazinePistolPK7
  - type: AttachableHolder
    slots:
      rmc-aslot-rail:
        whitelist:
          tags:
           - RMCAttachmentRailFlashlight
           - RMCAttachmentS5RedDotSight
           - RMCAttachmentS5MicroRedDotSight
           - RMCAttachmentS6ReflexSight
      rmc-aslot-underbarrel:
        whitelist:
          tags:
           - RMCAttachmentLaserSight
  - type: AttachableHolderVisuals
    offsets:
      rmc-aslot-rail: -0.1, 0.22
      rmc-aslot-underbarrel: 0.58, -0.2

- type: entity
  parent: CMBaseMagazinePistol
  id: RMCMagazinePistolPK7
  name: ПК-7 електростатичний магазин (9 мм)
  description: Вміщує 19 набоїв спеціалізованого кондуктивного калібру 9 мм. Електростатичний рух у ПК-7 працює за рахунок виштовхування набої 9 мм з пропорційно меншою швидкістю для підтримки вищої швидкості передачі кінетичної енергії. Все це перетворює пробивний снаряд на менш смертельний.
  components:
  - type: Tag
    tags:
    - CMMagazinePistol
    - RMCMagazinePistolPK7
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridgePistol9mmElectrostatic
    proto: RMCCartridgePistol9mmElectrostatic
    capacity: 19
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/pk7.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: ammo_band
      color: "#DF963F"

- type: entity
  id: RMCCartridgePistol9mmElectrostatic
  name: електростатичний набій (9 мм)
  parent: CMCartridgePistolBase
  components:
  - type: Tag
    tags:
    - Cartridge
    - RMCCartridgePistol9mmElectrostatic
  - type: CartridgeAmmo
    proto: RMCBulletPistol9mmElectrostatic

- type: entity
  parent: RMCProjectileTaser
  id: RMCBulletPistol9mmElectrostatic
#  name: електростатична куля (9 мм) – Sich
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Blunt: 0
  - type: RMCStaminaDamageOnCollide
    damage: 30

- type: Tag
  id: RMCWeaponPistolPK7

- type: Tag
  id: RMCMagazinePistolPK7

- type: Tag
  id: RMCCartridgePistol9mmElectrostatic
