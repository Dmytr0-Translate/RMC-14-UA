- type: entity
  parent: CMBaseMagazinePistol
  id: RMCMagazinePistolHandcannonHI
  name: магазин перегрин ручної гармати з набоями ПУД (.50)
  description: Сім нищівно потужних снарядів 50-го калібру. Кулі мають наконечники із синтезованого сплаву осмію та свинцю, щоб вразити абсолютно все, у що вони влучать. Направляйте кулі подалі від усього, що вам цінно.
  components:
  - type: Tag
    tags:
    - CMMagazinePistol
    - RMCMagazinePistolHandcannonHI
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridgePistolHandcannonHI
    proto: RMCCartridgePistolHandcannonHI
    capacity: 7
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/handcannon.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: ammo_band
      color: "#00CDEA"

- type: entity
  parent: CMBaseMagazinePistol
  id: RMCMagazinePistolHandcannonHIAP
  name: магазин перегрин ручної гармати з набоями ББ ПУД (.50)
  description: Сім нищівно потужних снарядів 50-го калібру. Кулі мають наконечники зі сплаву осмію та карбіду вольфраму, щоб не лише вразити, а й пробити броню будь-якої цілі. Випущено невеликою кількістю через величезну вартість виробництва та побоювання щодо можливості пробивати обшивку космічних станцій. Направляйте подалі від того, що вам цінно.
  components:
  - type: Tag
    tags:
    - CMMagazinePistol
    - RMCMagazinePistolHandcannonHIAP
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridgePistolHandcannonHIAP
    proto: RMCCartridgePistolHandcannonHIAP
    capacity: 7
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/handcannon.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: ammo_band
      color: "#429C60"

