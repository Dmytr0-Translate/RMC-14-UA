## Rifle magazines

- type: entity
  parent: CMMagazineRifleM54C
  id: RMCMagazineRifleM54CRubber
  name: М54С гумовий магазин (10х24 мм)
  description: Магазин нелетальних гумових набоїв калібру 10х24 мм для використання в бойовій гвинтівці М54С.
  components:
  - type: Tag
    tags:
    - CMMagazineRifle
    - CMMagazineRifleM54C
    - RMCMagazineRifleM54CRubber
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridgeRifle10x24mmRubber
    proto: RMCCartridgeRifle10x24mmRubber
    capacity: 40
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/m54ceriot.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

- type: entity
  parent: CMMagazineRifleBase
  id: RMCMagazineRifleM4SPRRubber
  name: М4СПГ гумовий магазин (10х24 мм)
  description: Магазин нелетальних гумових набоїв калібру 10х24 мм для використання в бойовій гвинтівці М4СПГ.
  components:
  - type: Tag
    tags:
    - CMMagazineRifle
    - CMMagazineRifleM4SPR
    - RMCMagazineRifleM4SPRRubber
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridgeRifle10x24mmRubber
    proto: RMCCartridgeRifle10x24mmRubber
    capacity: 25
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/m4sprriot.rsi

- type: entity
  parent: CMBaseCartridgeRifle
  id: RMCCartridgeRifle10x24mmRubber
  name: гумовий набій (10х24 мм)
  description: Набій 10х24 мм. Підходить для магазинів 10х24 мм, цей розроблений для меншої летальності.
  components:
  - type: Tag
    tags:
    - Cartridge
    - RMCCartridgeRifle10x24mmRubber
  - type: CartridgeAmmo
    proto: BulletRifle10x24mmRubber

- type: entity
  parent: RMCBaseBullet
  id: BulletRifle10x24mmRubber
  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Blunt: 3
  - type: RMCStaminaDamageOnCollide
    damage: 12.5
  - type: CMArmorPiercing
    amount: 5
  - type: RMCProjectileAccuracy
    accuracy: 105
    thresholds:
    - range: 16
      falloff: 10

