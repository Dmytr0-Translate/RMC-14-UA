- type: entity
  parent: CMMagazineRifleBase
  id: RMCMagazineSentry
  name: М30 барабанний магазин (10х28 мм)
  description: 500-ти набійний магазин безгільзових набоїв калібру 10x28мм для вартової турелі ОН 571-С. Просто вставте його в патронний відсік.
  components:
  - type: Item
    size: Normal
  - type: Tag
    tags:
    - RMCMagazineSentry
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCCartridgeSentry
    proto: RMCCartridgeSentry
    capacity: 500
    cycleable: false
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/un571c.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
    zeroOnlyOnEmpty: true
  - type: Appearance

- type: entity
  parent: CMMagazineRifleBase
  id: RMCMagazineSentryShotgun
  name: барабан з картеччю 12 калібра
  description: Барабан з 50 зарядами картечі 12 калібру для вартової турелі-дробовика ОН 12-Р. Просто вставте його в патронний відсік.
  components:
  - type: Tag
    tags:
    - RMCMagazineSentryShotgun
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCShellShotgunBuckshot
    proto: CMShellShotgunBuckshot
    capacity: 50
    cycleable: false
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/un12g.rsi


- type: entity
  parent: BaseMagazineRifle
  id: RMCMagazineSentryFire
  name: паливний бак для запальної турелі
  description: Паливний бак надгустого нафталевого палива, що використовується вогнеметною міні-вартовою туреллю ОН 45-ВМ. Містить палива на 100 нових пострілів.
  components:
  - type: Tag
    tags:
    - RMCMagazineSentryFire
  - type: BallisticAmmoProvider
    mayTransfer: True
    whitelist:
      tags:
      - RMCBulletSentryFireProjectile
    proto: RMCBulletSentryFireProjectile
    capacity: 100
    cycleable: false
  - type: Sprite
    sprite: _RMC14/Objects/Weapons/Guns/Ammunition/Magazines/sentry_flametank.rsi
    layers:
    - state: flametank
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: flametank_strip
      color: "#EE6515"

