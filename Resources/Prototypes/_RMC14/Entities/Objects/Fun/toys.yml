- type: entity
  parent: BasePlushie
  id: CMPlushieBase
  name: універсальна плюшка
  description: Ідеальна універсальність
  suffix: RMC
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Fun/plushies.rsi
    state: debug
  - type: Clothing
    quickEquip: false
    slots:
    - HEAD
  - type: UseDelay
    delay: 5 # Sich. 120 в оригіналі
  - type: EmitSoundOnLand
    sound:
      collection: ToyFall
  - type: EmitSoundOnCollide
    sound:
      collection: ToyFall

