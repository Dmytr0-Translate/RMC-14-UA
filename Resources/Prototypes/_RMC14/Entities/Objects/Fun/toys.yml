- type: entity
  parent: RMCPlushieSharkBlue
  id: RMCShorkMedicalOfficer
  name: плюшка акулячого лікаря
  description: Акулячий лікар здивована, що далеко не в перше бачить тебе на хірургійному столі за час цієї операції. Ти пробував бути обережніше?
  suffix: RMC
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Fun/smo.rsi
    state: SMO
  - type: Item
    inhandVisuals:
      left:
      - state: SMO-inhand-left
      right:
      - state: SMO-inhand-right

- type: entity
  parent: CMPlushieBase
  id: CMPlushieFarwa
  name: плюшева Фарва 
  description: Плюшева іграшка Фарва. Вона м'якенька й гарненька!
  components:
  - type: Sprite
    state: farwa

- type: entity
  parent: CMPlushieBase
  id: CMPlushieBarricade
  name: плюшева барикада
  description: Ідеально підходить щоб сховатися за нею від страху. Просто вірте що за нею вам нічого не зашкодить. Не намагайтеся використовувати її замість справжньої.
  components:
  - type: Sprite
    state: barricade

- type: entity
  parent: CMPlushieBase
  id: CMPlushieBee
  name: плюшева бджола
  description: Мила іграшка, що пробудить дух Бджоляра навіть в найбоягузливішому бійці.
  components:
  - type: Sprite
    state: bee

- type: entity
  parent: CMPlushieBase
  id: CMPlushieRock
  name: плюшевий камінь
  description: Камінь, беземоційний камінь. Чи ти краще каменя?
  components:
  - type: Sprite
    state: rock

- type: entity
  parent: CMPlushieBase
  id: CMPlushieTherapy
  name: терапевтична плюшка
  description: Терапевтична іграшка, яка допомагає відновити ментальне здоров'я морпіха.
  components:
  - type: Sprite
    layers:
    - state: therapy
      map: [ "enum.DamageStateVisualLayers.Base" ]
  - type: RandomSprite
    available:
    - enum.DamageStateVisualLayers.Base:
        therapy: Rainbow

- type: entity
  parent: CMPlushieBase
  id: CMPlushieRunnerBeret
  name: ХХ-121 терапевтична плюшка
  description: Не сумуй! Радій (що ти живий)!
  components:
  - type: Sprite
    state: runner_beret
  - type: Rotatable

- type: entity
  parent: CMPlushieBase
  id: RCMPlushieRounyLizard
  name: дурнувата плюша руні
  description: Дурнувата плюша всім відомого та знайомого червоного ксеноїда! Жодного уявлення, хто вирішив зробити її саме такою, але що маємо...
  components:
  - type: Sprite
    state: rouny_plushie

- type: entity
  parent: RMCPlushieBaseAdmin
  id: RMCPlushieAlec
  name: підозріла іграшка
  description: "Здається, ця іграшка пасивно тебе ненавидить. Краще жбурнути це в стінку. Її спина прикрашена біркою з переліком дивних і підозрілих матеріалів. У самому низу - ім’я виробника: Дрейк Індастріз"
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Fun/alec_plushie.rsi
    state: icon
  - type: Clothing
    sprite: _RMC14/Objects/Fun/alec_plushie.rsi
  - type: EmitSoundOnUse
    sound:
      collection: bottleOpenSounds
  - type: EmitSoundOnActivate
    sound:
      collection: bottleOpenSounds

- type: entity
  parent: RMCPlushieBaseAdmin
  id: RMCPlushieNyx
  name: проклята іграшка
  description: Кажуть, якщо прошепотіти "метал" у присутності цієї іграшки – опинишся в бездонній ямі постачання. Інші кажуть, вона зроблена на 99% з бавовни... І на 1% - з Нікси.
  components:
  - type: Sprite
    state: plushie_moth
  - type: EmitSoundOnUse
    sound:
      path: /Audio/Voice/Moth/moth_chitter.ogg
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Voice/Moth/moth_chitter.ogg
  - type: EmitSoundOnActivate
    sound:
      path: /Audio/Voice/Moth/moth_chitter.ogg
  - type: EmitSoundOnTrigger
    sound:
      path: /Audio/Voice/Moth/moth_chitter.ogg
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Voice/Moth/moth_chitter.ogg
  - type: Food
    requiresSpecialDigestion: true
    useSound:
      path: /Audio/Voice/Moth/moth_chitter.ogg

- type: entity
  parent: RMCPlushieNyx
  id: RMCPlushieMotivationalMoth
  name: мотиваційна іграшка молі
  description: М'яке та пухнасте ззовні, мило пищить, коли її стискають! Схоже, задумувалося, що вона буде допомагати слабким... Більше відчувається, що вона вас ненавидить.
  suffix: DO NOT MAP
  components:
  - type: Sprite
    state: plushie_wawa

- type: entity
  parent: RMCPlushieBaseAdmin
  id: RMCPlushieXippy
  name: ксіппі
  description: Кажуть, ця іграшка несе за собою хаос й насильство. Але ж вона така мила...
  components:
  - type: Sprite
    state: xippy
  - type: EmitSoundOnUse
    sound:
      collection: XenoRoar
  - type: EmitSoundOnLand
    sound:
      collection: XenoHelp
  - type: EmitSoundOnActivate
    sound:
      collection: XenoRoar
  - type: EmitSoundOnTrigger
    sound:
      collection: XenoRoar
  - type: MeleeWeapon
    soundHit:
      collection: XenoHelp

