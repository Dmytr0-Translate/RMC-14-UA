  description: Стандартний командний намет КМПОН. Цей – оснащений консоллю спостереження з автономним живленням та телефоном. Розкладається у відповідному місці для максимальної корисності. Прибирається за допомогою лопати, ШО в комплект не виходить. ВХІД З ПІВДНЯ.
