- type: entity
  parent: RMCTentBase
  id: RMCTentUNMCStandardCommand
  name: командний намет КМПОН
  description: Стандартний командний намет КМПОН. Цей – оснащений консоллю спостереження з автономним живленням та телефоном. Розкладається у відповідному місці для максимальної корисності. Прибирається за допомогою лопати, ШО в комплект не виходить. ВХІД З ПІВДНЯ.
  components:
  - type: Sprite
    layers:
    - state: standard_frame
    - state: standard_canvas
      map: [ "enum.ItemCamouflageLayers.Layer" ]
    - state: standard_roof
      map: [ "enum.ItemCamouflageLayers.Layer2", "standard_roof" ]
    - state: cmd_standard_canvas

- type: entity # Sich. Він став великим
  parent: RMCTentUNMCExtended
  id: RMCTentUNMCStandardMedical
  name: медичний намет КМПОН
  description: Стандартний медичний намет КМПОН. Цей – оснащений передовим мед. обладнанням, яке ви можете дозволити так легко переносити. Розкладається у відповідному місці для максимальної корисності. Прибирається за допомогою лопати, Лікар з хірургічним комплектом в комплект не виходить. ВХІД З ПІВДНЯ.
  components:
  - type: Sprite
    layers:
    - state: standard_frame
    - state: standard_canvas
      map: [ "enum.ItemCamouflageLayers.Layer" ]
    - state: extension_frame
    - state: extension_canvas
      map: [ "enum.ItemCamouflageLayers.Layer2" ]
    - state: standard_roof
      map: [ "enum.ItemCamouflageLayers.Layer3", "standard_roof" ]
    - state: extension_roof
      map: [ "enum.ItemCamouflageLayers.Layer4", "extension_roof" ]
    - state: med_standard_canvas
    - state: med_standard_roof
      map: [ "med_standard_roof" ]
  - type: RMCSpriteFade
    targetAlpha: 0.0
    changeRate: 6.0
    reactToMouse: false
    fadeLayers:
    - "standard_roof"
    - "extension_roof"
    - "med_standard_roof"


