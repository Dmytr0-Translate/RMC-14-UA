- type: entity
  parent: BaseItem
  id: RMCFulton
  name: пристрій для евакуація Фултона
  description: Система, яка застосовується КМПОН для підйому об'єктів із землі, що становлять інтерес. За принципом дії схожа на систему медевакуації. Після закріплення фултон підіймається в повітря та очікує на захоплення його шатлом з відповідною системою. Під час цього об'єкти переживають величезні перевантаження, тому використується для підіймання лише НЕ живого, по типу ящиків, обладнання чи тіл не придатних до реанімації. Зазвичай тримається в повітря близько 3 хвилин.
  suffix: 1
  components:
  - type: Sprite
    drawdepth: SmallObjects
    sprite: _RMC14/Objects/Tools/fulton.rsi
    state: fulton
  - type: Item
    size: Small
  - type: Stack
    stackType: RMCFulton
    count: 1
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: RMCFulton

