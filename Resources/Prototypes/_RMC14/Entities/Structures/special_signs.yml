- type: entity
  id: RMCSignRequisitions
  name: настанова відділу постачання КМПОН
  description: 1. Обслуговування Вас – це не обов'язок постачання. Спорядження видається за необхідності, а не за правом.

    2. Видача здійснюється лише за повного екіпірування. Спідня білизна з кріосну не обслуговується.

    3. Остаточне слово за Офіцером Логістики. Лише командуючий операцією може скасувати його рішення.

    4. Поводьтесь із працівниками постачання з повагою. Вони стараються, як можуть.
  placement:
    mode: SnapgridCenter
  components:
  - type: Transform
    anchored: true
  - type: Sprite
    sprite: _RMC14/Structures/decals.rsi
    state: roplaque
  - type: InteractionOutline
  - type: Clickable

- type: entity
  parent: RMCSignRequisitions
  id: RMCSignRequisitionsCreed
  name: табличка з КОЛ
  description: Скорочена версія Кредо Офіцера Логістики, розроблена Корпусом Офіцерів Логістики ОН. Є суто декоративною та церемоніальною версією, яка набагато коротша та не містить останніх змін.
  components:
  - type: Sprite
    state: rocreed

- type: entity
  parent: RMCSignRequisitions
  id: RMCSignWeYaRestrictedArea
  name: weston-yamada restricted area sign
  description: 1. The shipside Weston-Yamada Executive Bodyguard is permitted to non-lethally detain and/or disable trespassing or trouble-causing personnel in accordance with Marine Law in this area. Detained personnel must be transferred to Military Police custody.

                    2. The Executive Bodyguard is permitted longarms within the office while on Code Green.

    3. These rights are suspended outside of this office. Exception to the first rule is when the Bodyguard and/or Liaison are in immediate danger. Accordance to proper escalation is required.
  components:
  - type: Sprite
    state: weyarestrictedarea
