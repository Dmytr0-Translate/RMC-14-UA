- type: entity
  id: RMCPodDoorButton
  name: кнопка
  description: Дистанційний вимикач для дверей чи ще чогось, що можна перемикати.
  placement:
    mode: SnapgridCenter
    snap:
    - Wallmount
  components:
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    drawdepth: SmallObjects
    sprite: _RMC14/Objects/door_button.rsi
    layers:
    - state: doorctrl
      map: [ "enum.RMCPodDoorButtonLayers.Animation" ]
    - state: doorctrl-p
      visible: false
      map: [ "enum.PowerDeviceVisualLayers.Powered" ]
  - type: Clickable
  - type: InteractionOutline
  - type: WallMount
    arc: 360
  - type: RMCDoorButton
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        enum.PowerDeviceVisualLayers.Powered:
          True: { visible: false }
          False: { visible: true }
  - type: ApcPowerReceiver
  - type: RMCPowerReceiver
    idleLoad: 2
    activeLoad: 4
    channel: Environment
  - type: RMCMesonsNonviewable

