- type: entity
  parent: CMLockerBase
  id: CMLockerCMDCabinet
  name: шафка з планшетом командира
  suffix: Empty
  description: Куленепробивна шафка для речей Командира операції. До неї мають доступ лише Командири та наближені до них за рангом особи.
  # description: A bulletproof cabinet containing the command tablet for usage by the CO and XO. Opens only to them and department heads. (Parity desc, once Senior access is implemented)
  components:
  - type: WallMount
    arc: 175
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _RMC14/Structures/Wallmounts/cmdcabinet.rsi
  - type: EntityStorage
    capacity: 4 # Mriya. 3 в оригіналі. Планшет, гарнітура, картка та ще щось за бажанням
    isCollidableWhenOpen: true
    enteringOffset: 0, -0.6
    enteringRange: 0.03
    whitelist:
      tags:
      - CommandTablet
      - RMCHeadset
  - type: RMCEntityStorageWhitelist
    whitelist:
      tags:
      - CommandTablet
      - RMCHeadset
  - type: AccessReader
    access: [["RMCAccessSeniorCommand"]]
  - type: RMCMesonsNonviewable

- type: entity
  parent: CMLockerCMDCabinet
  id: CMLockerCMDCabinetFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: CMLockerFillCMDCabinet

# there should be a variant for CL, but it's fill is not yet implemented

- type: entityTable
  id: CMLockerFillCMDCabinet
  table: !type:AllSelector
    children:
    - id: RMCTabletCO
    - id: CMHeadsetSeniorCommand
    - id: MRIDCCardReserve # Mriya. Резервна картка для офіцерів

- type: entity
  parent: CMLockerBase
  id: RMCEmergencySurgicalCabinet
  name: аварійна шафка з хірургічним обладнанням
  description: Гіпербезпечна, самостерилізуюча настінна шафа, що містить додаткові портативні хірургічні столи, системи розвантаження з хірургічними інструментами та портативні апарати для діалізу. Вона розблоковується та відкривається самостійно під час атаки на корабель.
  suffix: Empty
  placement:
    mode: SnapgridCenter
  components:
  - type: WallMount
    arc: 175
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _RMC14/Structures/Wallmounts/surgical.rsi
  - type: Corrodible
    isCorrodible: false
  - type: Destructible
    thresholds: []
  - type: EntityStorage
    isCollidableWhenOpen: true
    enteringOffset: 0, -0.6
    enteringRange: 0.03
    whitelist:
      tags:
      - CMRollerItem
      - CMRollerBed
      components:
      - Webbing
      - PortableDialysis
  - type: RMCEntityStorageWhitelist
    whitelist:
      tags:
      - CMRollerItem
      - CMRollerBed
      components:
      - Webbing
      - PortableDialysis
  - type: AccessReader
    access: [["CMAccessMedical"]]
  - type: RMCLockerOpenOnHijack
  - type: RMCMesonsNonviewable

- type: entity
  parent: RMCEmergencySurgicalCabinet
  id: RMCEmergencySurgicalCabinetFilled
  suffix: Fills on Hijack
  components:
  - type: RMCOnHijackFill
    jobs:
    - CMCMO
    - CMDoctor
    scaleWithJobs: true
    table: !type:NestedSelector
      tableId: RMCEmergencySurgicalCabinetTable

- type: entityTable
  id: RMCEmergencySurgicalCabinetTable
  table: !type:AllSelector
    children:
    - id: CMPortableSurgicalBedSpawnFolded
    - id: RMCPortableDialysis
    - !type:GroupSelector
      children:
      - id: RMCWebbingSurgicalGreen
      - id: RMCWebbingSurgicalBlue
