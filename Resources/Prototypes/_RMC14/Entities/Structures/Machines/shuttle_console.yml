- type: entity
  parent: CMBaseStructure
  abstract: true
  id: CMComputerDropship
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/shuttle_console.rsi
    drawdepth: SmallObjects
  - type: Corrodible
    isCorrodible: false
  - type: InteractionOutline

- type: entity
  parent: CMComputerDropship
  id: CMComputerDropshipNavigation
  name: навігаціний комп'ютер шатла
  description: Бортовий комп'ютер, який можна використовувати для польотів за допомогою шатла.
  components:
  - type: GuideHelp
    guides:
    - RMCGuideRoleCAS
  - type: Sprite
    state: console
  - type: DropshipNavigationComputer
  - type: ActivatableUI
    key: enum.DropshipNavigationUiKey.Key
  - type: AccessReader
    access: [["CMAccessSquadLeaderPrep"], ["CMAccessDropship"], ["CMAccessXeno"]] # Xeno have access as to not cause the "Access denied!" popup.
  - type: ActivatableUIRequiresAccess
  - type: UserInterface
    interfaces:
      enum.DropshipNavigationUiKey.Key:
        type: DropshipNavigationBui
      enum.DropshipHijackerUiKey.Key:
        type: DropshipHijackerBui

- type: entity
  parent: CMComputerDropshipNavigation
  id: CMComputerDropshipNavigationERT
  name: навігаціний комп'ютер шатла
  description: Бортовий комп'ютер транспортного шатла, який можна використовувати для польотів за допомогою шатла.
  components:
  - type: Sprite
    state: syndishuttle
  - type: DropshipNavigationComputer
    hijackable: false

- type: entity
  parent: CMComputerDropship
  id: CMComputerDropshipNavigationPlanetside
  name: шатловий навігаційний комп'ютер
  description: Комп'ютер, завдяки якому можна керувати автопілотом прив'язаних до нього шатлів.
  suffix: Planetside
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/dropship_nav_computer.rsi
    state: on
  - type: ActivatableUI
    key: enum.DropshipTerminalUiKey.Key
  - type: AccessReader
    access: [["CMAccessDropship"], ["CMAccessSquadLeaderPrep"], ["CMAccessXeno"]] # Xeno have access as to not cause the "Access denied!" popup.
  - type: ActivatableUIRequiresAccess
  - type: DropshipTerminal
  - type: UserInterface
    interfaces:
      enum.DropshipTerminalUiKey.Key:
        type: DropshipTerminalBui

- type: entity
  parent: CMComputerDropship
  id: CMComputerDropshipCamerasAlamo
  name: керування камерами
  description: Консоль для моніторингу камер підключених до шатла.
  suffix: Alamo
  components:
  - type: GuideHelp
    guides:
    - RMCGuideRoleCAS
  - type: Sprite
    state: consoleleft
  - type: UserInterface
    interfaces:
      enum.RMCCameraUiKey.Key:
        type: RMCCameraBui
  - type: RMCCameraComputer
    protoIds:
    - RMCMonitorCameraAlamo
  - type: ActivatableUI
    key: enum.RMCCameraUiKey.Key

- type: entity
  parent: CMComputerDropshipCamerasAlamo
  id: RMCComputerDropshipCamerasNormandy
  name: керування камерами
  description: Консоль для моніторингу камер підключених до шатла.
  suffix: Normandy
  components:
  - type: RMCCameraComputer
    protoIds:
    - RMCMonitorCameraNormandy

- type: entity
  parent: CMComputerDropship
  id: CMComputerDropshipWeapons
  name: керування озброєнням
  description: Консоль для використання й керування озброєнням та обладнанням встановленим на шатл.
  components:
  - type: GuideHelp
    guides:
    - RMCGuideRoleCAS
  - type: Sprite
    state: consoleright
  - type: ActivatableUI
    key: enum.DropshipTerminalWeaponsUi.Key
  - type: AccessReader
    access: [ [ "CMAccessPilot" ], [ "CMAccessSquadLeaderPrep" ], [ "RMCAccessWeYaFlight" ] ]
  - type: ActivatableUIRequiresAccess
  - type: UserInterface
    interfaces:
      enum.DropshipTerminalWeaponsUi.Key:
        type: DropshipWeaponsBui
  - type: DropshipTerminalWeapons
  - type: TacticalMapComputer
  - type: RequiresSkill
    skills:
      RMCSkillPilot: 1

- type: entity
  parent: CMBaseStructure
  id: RMCComputerDropshipNavigationSmall
  name: шатловий навігаційний комп'ютер
  description: Комп'ютер, завдяки якому можна керувати автопілотом прив'язаних до нього шатлів.
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    drawdepth: Objects
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: security_cam
    layers: [ ]
  - type: Clickable
  - type: Corrodible
    isCorrodible: false
  - type: InteractionOutline
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: WallMount
    arc: 360
  - type: DropshipNavigationComputer
  - type: ActivatableUI
    key: enum.DropshipNavigationUiKey.Key
  - type: AccessReader
    access: [ ["CMAccessSquadLeaderPrep"], [ "CMAccessDropship" ] ]
  - type: ActivatableUIRequiresAccess
  - type: UserInterface
    interfaces:
      enum.DropshipNavigationUiKey.Key:
        type: DropshipNavigationBui
      enum.DropshipHijackerUiKey.Key:
        type: DropshipHijackerBui
  - type: PointLight
    enabled: true
    radius: 1.5
    netsync: true
    energy: 1
    offset: "0,0"
    color: "#FFEFD2"
    mask: /Textures/_RMC14/Effects/LightMasks/quad_cone.png

- type: entity
  parent: CMBaseStructure
  id: RMCComputerDropshipWeaponsSmall
  name: керування озброєнням
  description: Консоль для використання й керування озброєнням та обладнанням встановленим на шатл.
  components:
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Static
    canCollide: false
  - type: Sprite
    drawdepth: Objects
    sprite: _RMC14/Structures/Machines/computer.rsi
    state: security_cam
    layers: [ ]
  - type: Clickable
  - type: Corrodible
    isCorrodible: false
  - type: InteractionOutline
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno
  - type: WallMount
    arc: 360
  - type: AccessReader
    access: [ ["CMAccessSquadLeaderPrep"], [ "CMAccessDropship" ] ]
  - type: PointLight
    enabled: true
    radius: 1.5
    netsync: true
    energy: 1
    offset: "0,0"
    color: "#FFEFD2"
    mask: /Textures/_RMC14/Effects/LightMasks/quad_cone.png
  - type: ActivatableUI
    key: enum.DropshipTerminalWeaponsUi.Key
  - type: ActivatableUIRequiresAccess
  - type: UserInterface
    interfaces:
      enum.DropshipTerminalWeaponsUi.Key:
        type: DropshipWeaponsBui
  - type: DropshipTerminalWeapons
  - type: TacticalMapComputer

- type: entity
  parent: MarkerBase
  id: CMDropshipDestination
  name: dropship destination
  description: Defines a valid location for the dropships to FTL to when piloted.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    state: green
  - type: FTLBeacon
  - type: DropshipDestination
  - type: FTLSmashImmune
  - type: NoFTL

- type: entity
  parent: MarkerBase
  id: CMDropshipHijackDestination
  name: hijack destination
  description: Defines a valid location for the dropships to FTL to when hijacked.
  placement:
    mode: SnapgridCenter
  components:
  - type: Sprite
    state: green
  - type: FTLBeacon
  - type: DropshipHijackDestination
  - type: FTLSmashImmune
  - type: NoFTL
