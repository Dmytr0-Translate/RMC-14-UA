- type: entity
  parent: BaseMachinePowered
  abstract: true
  id: RMCBasePhotocopier
  name: копірувальний апарат
  description: Копіювальний апарат, який використовується для копіювання... Ну, знаєте, фотографій! Також корисний для копіювання документів на папері. Ця конкретна модель була виготовлена ​​компанією ЕГІДА Армаментс у дешевшому корпусі, ніж більшість сучасних копіювальних апаратів. Він використовує примітивну технологію копіювання, що призводить до більшої витрати фарби та менших можливостей друку. Тим не менш, його дешева конструкція означає нижчі витрати, а для людей, яким здебільшого потрібно друкувати лише один-два аркуші, він стає економічно вигідним.
  components:
  - type: Transform
    anchored: false
    noRot: true
  - type: Physics
    bodyType: Static
  - type: ApcPowerReceiver
    needsPower: false # TODO RMC14
    powerLoad: 0
  - type: LitOnPowered
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.45,0.25,0.45"
        mask:
        - MachineMask
        layer:
        - MachineLayer
        density: 200
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCBasePhotocopier
  id: RMCPhotocopier
  name: копірувальний апарат
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/photocopier.rsi
    drawdepth: Objects
    state: bigscanner
  - type: Icon
    sprite: _RMC14/Structures/Machines/photocopier.rsi
    state: bigscanner

- type: entity
  parent: RMCPhotocopier
  id: RMCPhotocopierSmallHitbox
  suffix: Smaller
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.05,0.4,0.05"
        mask:
        - MachineMask
        layer:
        - MachineLayer
        density: 200

- type: entity
  parent: RMCBasePhotocopier
  id: RMCPhotocopierPro
  name: копірувальний апарат Ве-Я
  description: Копіювальний апарат, який використовується для копіювання... Ну, знаєте, фотографій! Також корисний для копіювання документів на папері. Ця конкретна модель виготовлена ​​компанією Ве-Я у сучаснішому та міцнішому корпусі (не треба його бити), ніж звичайні фотокопіювальні апарати. Він використовує одні з найпередовіших технологій у галузі друку на папері, завдяки чому сильно економить фарбу та покращує якість. Все це робить його улюбленим серед споживачів, яким потрібно друкувати великі обсяги документів для своїх щоденних обов'язків.
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Machines/photocopier.rsi
    drawdepth: Objects
    state: bigscannerpro
  - type: Icon
    sprite: _RMC14/Structures/Machines/photocopier.rsi
    state: bigscannerpro
