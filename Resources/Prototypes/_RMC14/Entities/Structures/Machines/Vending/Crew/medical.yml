# MEDICAL

- type: entity
  parent: ColMarTechBase
  id: ColMarTechCrewMedicalEquipment
  name: Медична стійка КолМарТех
  description: Автоматизована стійка з видачі спорядження для медичного персоналу.
  components:
  - type: AccessReader
    access:
    - [ "CMAccessMedical" ]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/medical_equipment.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMNurse
    - CMDoctor
    - RMCFieldDoctor
    - CMResearcher
    - CMCMO
    sections:
    - name: "Медичний набір (обов'язково)"
      jobs:
      - CMDoctor
      - RMCFieldDoctor
      - CMResearcher
      - CMCMO
      takeAll: CMMedicalSet
      entries:
      - id: RMCVendorBundleCrewMedicalEssentialsDoctor
    - name: "Медичний набір (обов'язково)"
      jobs:
      - CMNurse
      takeAll: CMMedicalSet
      entries:
      - id: CMVendorBundleCrewMedicalEssentialsNurse
    - name: Стандартне екіпірування
      jobs: # Sich
      - CMNurse
      - CMDoctor
      - CMResearcher
      - CMCMO
      takeAll: CMStandard
      entries:
      - id: CMHandsLatex
      - id: CMHeadsetMedical
    - name: Стандартне екіпірування # Sich
      jobs:
      - RMCFieldDoctor
      takeAll: CMStandard
      entries:
      - id: CMHandsLatex
      - id: CMHeadsetMedical
      - id: CMMRE
      - id: RMCBinoculars
      - id: RMCMotionDetectorCompact
      - id: CMBootsBlackFilled
    - name: Окуляри
      choices: { CMEyewear: 1 }
      entries:
      - id: RMCGlassesMedicalHUDGlasses
      - id: RMCGlassesReagentHUDGlasses # Sich
#      - id: Prescription Medical HUD Glasses
    - name: Броня # Sich
      jobs:
      - RMCFieldDoctor
      choices: { CMArmor: 1 }
      entries:
      - id: RMCArmorVestOfficer
      - id: RMCArmorM3LightVariants
        recommended: true
      - id: CMArmorM3VLBallistics
        recommended: true
    - name: Зброя # Sich
