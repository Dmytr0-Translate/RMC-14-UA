- type: entity
  parent: CMBeltBaseStorage
  id: CMBeltSecurity
  name: ремінь охорони зразка М276
  description: М276 це стандартний елемент спорядження КМПОН. Складається з ременя з різноманітними кріпленнями. Ця конфігурація найбільш поширена серед Військової Служби Правопорядку та миротворців, проте досі може вміщувати легкі магазини.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Belt/security.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Belt/security.rsi
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,13,1 # 7 slots
    whitelist:
      tags:
      - SecBeltEquip
      - Taser
      - Flashlight
      - CMMagazinePistol
      - RMCShellShotgun
      - RMCMagazineRevolver
      - Donut
      - RMCGrenadeFlashBang
      - Radio
      components:
      - Handcuff
      - Flash
      - FlashOnTrigger
      - Stunbaton
      - ForensicScanner
      - MeleeWeapon
      - Gun
      - RMCLighter
  - type: FixedItemSizeStorage

- type: entity
  parent: CMBeltSecurity
  id: CMBeltSecurityMP
  name: ремінь військової служби правопорядку зразка М276
  description: М276 це стандартний елемент спорядження КМПОН. Складається з ременя з різноманітними кріпленнями. Ця версія має різноманітні малі підсумки для нелетального оснащення та кайданків.
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,11,1 # 6 slots

- type: entity
  parent: CMBeltSecurity
  id: RMCBeltSecurityWeYa
  name: ремінь корпоративної охорони зразка М276-К
  description: Адаптація ременю М276 від Вестон-Ямада, спроєктована для копроративних сил охорони. Цей модульний чорний ремінь має декілька підсумків для кайданків, магазинів, нелетального та летального оснащення для підтримки порядку.

- type: entity
  parent: CMBeltSecurityMP
  id: CMBeltSecuritySPP
  name: ремінь військової поліції Тип 43
  description: Тип 43 це стандартний елемент спорядження СПН. Складається з ременя з різноманітними кріпленнями. Ця версія має різноманітні малі підсумки для нелетального оснащення та кайданків.

- type: entity
  parent: CMBeltSecurityMP
  id: CMBeltSecurityMarshal
  name: пояс маршала
  description: Чорний службовий пояс, який служить для перенесення оснащення Маршалів. Це важкий поліційний ремінь з кількома підсумками для різноманітних предметів правоохоронців.
  components:
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,15,1 # 8 slots
