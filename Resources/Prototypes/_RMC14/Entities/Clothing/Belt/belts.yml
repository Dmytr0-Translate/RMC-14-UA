# Storage
- type: entity
  parent: CMBeltBaseStorage
  id: CMBeltMarine
  name: ремінь для магазинів зразка М276
  description: М276 це стандартний елемент спорядження КМПОН. Складається з ременя з різноманітними кріпленнями. Ця версія стандартна, спроєктована для носіння великої кількості боєприпасів.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Belt/marine/jungle-classic.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Belt/marine/jungle-classic.rsi
  - type: Item
    size: Large
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,9,1 # 5 slots
    whitelist:
      tags:
      - Flare
      - RMCShellShotgun
      - CMMagazinePistol
      - RMCMagazineRevolver
      - CMMagazineRifle
      - RMCMagazineShotgun
      - CMMagazineSmg
      - CMMagazineSniper
      - Grenade
      #      - # TODO RMC14 mines
      #      - # TODO RMC14 snacks
      components:
      - BallisticAmmoProvider
    blacklist:
      tags:
      - RMCAttachmentUnderbarrel
  - type: IgnoreContentsSize
    items:
      tags:
      - CMMagazineRifle
      - RMCMagazineShotgun
      - CMMagazineSmg
  - type: FixedItemSizeStorage
  - type: ItemCamouflage
    camouflageVariations:
      Jungle: _RMC14/Objects/Clothing/Belt/marine/jungle-classic.rsi
      Snow: _RMC14/Objects/Clothing/Belt/marine/snow-urban.rsi
      Desert: _RMC14/Objects/Clothing/Belt/marine/desert.rsi
      Urban: _RMC14/Objects/Clothing/Belt/marine/snow-urban.rsi
      Classic: _RMC14/Objects/Clothing/Belt/marine/jungle-classic.rsi

