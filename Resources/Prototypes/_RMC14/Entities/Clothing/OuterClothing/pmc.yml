# PMC armors
- type: entity
  parent: [RMCBaseMarineArmor, RMCAllowSuitStorageClothingArmorPMC]
  id: RMCArmorM4PMCNoLight
  name: броня ПВК зразка М4
  description: Модифікація стандартної броні М3, розроблена з урахуванням потреб операторів охорони високого рівня та корпоративних найманців.
  suffix: No Suitlamp
  components:
  - type: RMCArmorSpeedTier
    speedTier: medium
  - type: ExplosionResistance
    damageCoefficient: 0
    worn: false
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/pmc.rsi
  - type: CMArmor
    melee: 20
    bullet: 25 # CLOTHING_ARMOR_MEDIUMHIGH
    bio: 20 # CLOTHING_ARMOR_MEDIUM
    explosionArmor: 20 # CLOTHING_ARMOR_MEDIUM
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_LIGHT
    walkModifier: 0.725
    sprintModifier: 0.725
  - type: Storage
    grid:
    - 0,0,3,1 # 2 slots
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: ClothingRequireEquipped
    autoUnequip: true
    denyReason: rmc-armor-not-pmc-jumpsuit
    whitelist:
      tags:
      - RMCUniformPMC

- type: entity
  parent: [RMCArmorM4PMCNoLight, RMCBasePMCArmorLight]
  id: CMArmorM4PMC
  suffix: Suitlamp

- type: entity
  parent: CMArmorM4PMC
  id: CMArmorM4PMCLight
  name: легка броня ПВК зразка М4
  description: Модифікація стандартної броні М3, розроблена з урахуванням потреб операторів охорони високого рівня та корпоративних найманців. Деякі частини було знято задля додаткової мобільності.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/sniper.rsi
  - type: CMArmor
    melee: 15 # CLOTHING_ARMOR_MEDIUMLOW
    bullet: 20 # CLOTHING_ARMOR_MEDIUM
    bio: 20 # CLOTHING_ARMOR_MEDIUM
    explosionArmor: 15 # CLOTHING_ARMOR_MEDIUMLOW
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_VERY_LIGHT
    walkModifier: 0.897
    sprintModifier: 0.897

- type: entity
  parent: CMArmorM4PMCLight
  id: RMCArmorM4PMCBulletProof
  name: M4 pattern PMC bulletproof armor
  description: A modification of the standard M3 armor. Designed for high-profile security operators and corporate mercenaries in mind. This set is designed for protecting against ballistics, and has minimal protection against blades and biohazards.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/bulletproof.rsi
  - type: CMArmor
    melee: 10 # CLOTHING_ARMOR_LOW
    bullet: 30 # CLOTHING_ARMOR_HIGH
    bio: 10 # CLOTHING_ARMOR_LOW
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_SUPER_LIGHT
    walkModifier: 0.949
    sprintModifier: 0.949

- type: entity
  parent: [RMCArmorM4PMCNoLight, RMCBaseMarineArmorLight]
  id: CMArmorM4PMCCorporate
  name: броня корпоративної охорони зразка М1
  description: Звичайний жилет з відзнакою Ве-Я на правій грудині. Зазвичай використовується охоронцями нижчого рівня на об'єктах Вестон-Ямада.
  suffix: ""
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/corporate.rsi
  - type: CMArmor
    melee: 15
    bullet: 20 # CLOTHING_ARMOR_MEDIUM
    bio: 20 # CLOTHING_ARMOR_MEDIUM
    explosionArmor: 15 # CLOTHING_ARMOR_MEDIUMLOW
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_LIGHT
    walkModifier: 0.725
    sprintModifier: 0.725

- type: entity
  parent: CMArmorM4PMCCorporate
  id: CMArmorM4PMCCorporateLead
  description: Звичайний жилет з відзнакою Ве-Я на правій грудині. Зазвичай використовується охоронцями нижчого рівня, що заслужили підвищення за 'гарні заслуги у праці', також відомі як дуполизання.
  suffix: Leader
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/corporate_lead.rsi

- type: entity
  parent: CMArmorM4PMC
  id: CMArmorM4PMCLeader
  name: броня лідера ПВК зразка М4
  description: Модифікація стандартної броні М3, розроблена з урахуванням потреб операторів охорони високого рівня та корпоративних найманців. Конкретно ця модель виглядає, наче вона належить високо поставленому офіцеру.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/officer.rsi

- type: entity
  parent: RMCArmorM4PMCNoLight
  id: CMArmorM4PMCSniper
  name: броня снайпера ПВК зразка М4
  description: Модифікація стандартної броні М3, розроблена з урахуванням потреб операторів охорони високого рівня та корпоративних найманців. Конкретно ця модель виглядає, наче вона належить високо поставленому офіцеру.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/sniper.rsi
  - type: CMArmor
    bullet: 25
    explosionArmor: 20

- type: entity
  parent: CMArmorM4PMCLight
  id: CMArmorM4PMCSynth
  name: броня синтетика ПВК зразка М4
  description: Модифікація стандартної броні М3. Цей варіант розроблений для синтетиків підтримки ПВК, з витягнутою усією бронею. Створено з думкою, що швидкість понад усе.
  components:
  - type: Clothing
    equipDelay: 1
    unequipDelay: 0.5
  - type: CMArmor
    melee: 0 # CLOTHING_ARMOR_NONE
    bullet: 0
    bio: 0
    explosionArmor: 0
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_SUPER_LIGHT
    walkModifier: 0.949
    sprintModifier: 0.949
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots

- type: entity
  parent: CMArmorM4PMCSynth
  id: RMCArmorM4PMCSynthFilled
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: RMCMagazineSMGNailgun
    - id: RMCMagazineSMGNailgun
    # - id: RMCTelescopicBaton // 8/21/25: telebaton implementation is TODOed

- type: entity
  parent: RMCArmorM4PMCNoLight
  id: CMArmorM4PMHeavy
  name: важка броня ПВК
  description: Модифікація стандартної броні М3. Оснащена додатковим бронюванням для кращого захисту.

- type: entity
  parent: CMArmorM4PMHeavy
  id: CMArmorM4PMCSmartGunHarness
  name: броня оператора СмартГана ПВК
  description: Модифікація стандартної броні М3, оснащена підсиленими ременями та стропами, що дозволяють користувачу носити СмартГан МЛ66A.
  components:
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,3,1 # 2 slots
  - type: Corrodible
    isCorrodible: false
  - type: ClothingBlockBackpack
  - type: SmartGunArmor

- type: entity
  parent: CMArmorM4PMCSmartGunHarness
  id: CMArmorM4PMCSmartGunHarnessCommando
  name: екзоскелетна броня оператора СмартГана М5П
  description: Складна система накладених одна на одну пластин, призначена для того, щоб зробити власника практично невразливим до стрілецької зброї. Пасивний екзоскелет підтримує вагу броні, дозволяючи користувачу переносити її масивний об'єм. Цей варіант розроблений для роботи зі СмартГаном МЛ66A
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/commando.rsi
  - type: CMArmor
    melee: 30 # CLOTHING_ARMOR_HIGH (melee)
    bullet: 50 # CLOTHING_ARMOR_ULTRAHIGH (bullets)
    bio: 20 # CLOTHING_ARMOR_MEDIUM
    explosionArmor: 40 # CLOTHING_ARMOR_VERYHIGH
  - type: RMCArmorSpeedTier
    speedTier: medium
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_MEDIUM
    walkModifier: 0.666
    sprintModifier: 0.666
  - type: Corrodible
    isCorrodible: false
  - type: IgnoreContentsSize
    items:
      tags:
      - RMCMagazineSmartGunirradiated
      - RMCMagazineSmartGun

- type: entity
  parent: CMArmorM4PMC
  id: CMArmorM4PMCCommandoSurvivor
  name: damaged MY7 pattern Commando armor
  description: A modification of the WEYA PMC armor patterns. Designed for elite corporate mercenaries in mind. This one has a lot of scratches and acid damage.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/commando.rsi
  - type: CMArmor
    melee: 20
    bullet: 40
    bio: 20
    explosionArmor: 35
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots

- type: entity
  parent: RMCArmorM4PMCNoLight
  id: CMArmorM4PMCCommando
  name: екзоскелетна броня М5Х
  description: Складна система накладених одна на одну пластин, призначена для того, щоб зробити власника практично невразливим до стрілецької зброї. Пасивний екзоскелет підтримує вагу броні, дозволяючи користувачу переносити її масивний об'єм.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/commando.rsi
  - type: CMArmor
    melee: 40 # CLOTHING_ARMOR_VERYHIGH (melee);
    bullet: 50 # CLOTHING_ARMOR_ULTRAHIGH (bullets); going with an intermediate value until more damage types get implemented (more likely to be hit by bullets than melee)
    bio: 20 # CLOTHING_ARMOR_MEDIUM
    explosionArmor: 40 # CLOTHING_ARMOR_VERYHIGH
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_MEDIUM
    walkModifier: 0.727
    sprintModifier: 0.727
  - type: Corrodible
    isCorrodible: false

- type: entity
  parent: RMCArmorM4PMCNoLight
  id: RMCArmorM4PMCEngineer
  name: броня інженера ПВК зразка М4
  description: Модифікація стандартної броні М3. Захищає від електричного розряду, вогню та уламків, але майже не забезпечує кулезахист завдяки нестачі кевлару.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/engineer.rsi
  - type: CMArmor
    bullet: 15 # CLOTHING_ARMOR_MEDIUMLOW
    explosionArmor: 20 # CLOTHING_ARMOR_MEDIUM
    # TODO 20 internal damage protection
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.3
  - type: RMCImmuneToIgnition
    immuneToDirectHits: false

- type: entity
  parent: RMCBaseJacket
  id: RMCArmorPMCDirector
  name: куртка директора
  description: Куртка, що належить дуже важливій особі. Виготовлена з ізоляційного матеріалу та забезпечує незначний захист від усіх видів ушкоджень.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/director.rsi
  # TODO RMC14: Taser immunity?
  - type: CMArmor
    melee: 15 # CLOTHING_ARMOR_MEDIUMLOW
    bullet: 20 # CLOTHING_ARMOR_MEDIUM
    bio: 20 # CLOTHING_ARMOR_MEDIUM
    explosionArmor: 20 # CLOTHING_ARMOR_MEDIUM
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots

# Executive Bodyguard
- type: entity
  parent: CMArmorM4PMCLight
  id: RMCArmorM4ExecutiveBodyguard
  name: M4 pattern executive bodyguard armor
  description: A modification of the standard AEGIS M3 armor. This variant is worn by Executive Bodyguards protecting Weston-Yamada employees, as denoted by the blue detailing.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/PMC/ppo_armor.rsi
  - type: CMArmor
    melee: 20 # CLOTHING_ARMOR_MEDIUM
    bullet: 25 # CLOTHING_ARMOR_MEDIUMHIGH
    bio: 10 # CLOTHING_ARMOR_LOW
    explosionArmor: 25 # CLOTHING_ARMOR_MEDIUMHIGH
  - type: RemoveComponents
    components:
    - type: ClothingRequireEquipped
      autoUnequip: true
      denyReason: rmc-armor-not-pmc-jumpsuit
      whitelist:
        tags:
        - RMCUniformPMC

