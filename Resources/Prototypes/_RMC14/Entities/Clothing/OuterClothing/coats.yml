# ChiefMP
- type: entity
  parent: RMCBaseJacket
  id: CMCoatChiefMP
  name: службова куртка голови служби правопорядку
  description: Морпіхотна службова куртка прийнята для використання головами Військової Служби Правопорядку на борту кораблів КМПОН. Іронічно, більшість кораблів вимагають від їхніх ВСП носіння броні увесь час, через що ці куртки рідко носять ГВСП на службі. Дуже популярні серед тих, хто хоче пахнути пончиками.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/cmp.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/cmp.rsi
  - type: CMArmor
    melee: 10


# Military Warden
- type: entity
  parent: RMCBaseJacket
  id: CMCoatWarden
  name: службова куртка військового наглядача
  description: Морпіхотна службова куртка прийнята для використання військових наглядачів Військової Служби Правопорядку на борту кораблів КМПОН. Іронічно, більшість кораблів вимагають від їхніх ВСП носіння броні увесь час, через що ці куртки рідко носять наглядачі на службі. Куртка це вибір для тих, хто усю ніч сидить за моніторами, поки бички з цигарок створюють горні хребти довколо нього.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/warden.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/warden.rsi
  - type: CMArmor
    melee: 10

# Military Police
- type: entity
  parent: [RMCBaseJacketButtonable, RMCBaseJacket]
  id: CMCoatMP
  name: службова куртка служби правопорядку
  description: Морпіхотна службова куртка прийнята для використання персоналом Військової Служби Правопорядку на борту кораблів КМПОН. Іронічно, більшість кораблів вимагають від їхніх ВСП носіння броні увесь час, через що ці куртки рідко носять ВСП на службі. Цей варіант також доступний звичайним морпіхам, якщо вони, звісно, винесуть цю ганьбу.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/mp.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/mp.rsi
