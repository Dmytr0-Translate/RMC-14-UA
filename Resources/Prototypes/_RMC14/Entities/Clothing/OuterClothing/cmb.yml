- type: entity
  id: RMCBaseCMBArmor
  abstract: true
  components:
  - type: ClothingRequireEquipped
    autoUnequip: true
    denyReason: rmc-armor-not-cmb-jumpsuit
    whitelist:
      tags:
      - RMCUniformCMB

- type: entity
  parent: [RMCBaseCMBArmor, RMCBaseMarineArmorLight]
  id: RMCArmorM4RLight
  name: легка броня БКМ зразка М4Р
  description: Темний комплект броні, яка є модифікацією броні М3 від АЕГІС Армаментс. Створена для контролю заворушень і придушення протестів у задумі. На боку має металевий значок з написом 'СПЕЦНАЗ БКМ'. Закони Землі поширюються далеко за межі сонячної системи.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/CMB/cmb_light_armor.rsi
  - type: CMArmor
    melee: 20
    bullet: 25
    bio: 15
    explosionArmor: 20
  - type: RMCArmorSpeedTier
    speedTier: medium
  - type: ClothingSpeedModifier # light armor speed
    walkModifier: .725
    sprintModifier: .725
  - type: ExplosionResistance
    damageCoefficient: 0
    worn: false
  - type: ItemCamouflage
    camouflageVariations: { }

