# Bureau Deputy
- type: entity
  parent: [RMCAllowSuitStorageClothingJacketMB, RMCBaseJacket]
  id: RMCCoatBureauDeputy
  name: куртка помічника БКМ
  description: Товста й стильна чорна шкіряна куртка з прикріпленим значком помічника маршала. На спині викарбувані могутні літери 'ПОМІЧНИК', що уособлюють справедливість, владу та захист на зовнішніх рубежах. Закони Землі поширюються далеко за межі сонячної системи.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/Bureau/deputy.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/Bureau/deputy.rsi
  - type: CMArmor
    melee: 15
    bullet: 15
    bio: 10
    explosionArmor: 10

- type: entity
  parent: RMCCoatBureauDeputy
  id: RMCCoatBureauMarshal
  name: куртка маршала БКМ
  description: Товста й стильна чорна шкіряна куртка з прикріпленим значком  маршала. На спині викарбувані могутні літери 'МАРШАЛ', що уособлюють справедливість, владу та захист на зовнішніх рубежах. Закони Землі поширюються далеко за межі сонячної системи.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/Bureau/marshal.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/Bureau/marshal.rsi

# Fur coats
- type: entity
  parent: RMCCoatBureauDeputy
  id: RMCCoatExpensiveFur
  name: дорогий довгий плащ із хутряною підкладкою
  description: Розкішний довгий плащ у вінтажному стилі з хутряною підкладкою, що випромінює класичну нуарну елегантність. Цей вишуканий одяг значно перевищує бюджет пересічної людини й доступний лише високопосадовцям та елітному військовому персоналу.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/FurCoat/fur_coat.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/FurCoat/fur_coat.rsi

- type: entity
  parent: RMCCoatExpensiveFur
  id: RMCCoatExpensiveFurAlt
  suffix: Alternative
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/FurCoat/fur_coat_alt.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/FurCoat/fur_coat_alt.rsi

# High Command

- type: entity
  parent: RMCCoatBureauDeputy
  id: RMCCoatJacketGeneral
  name: плащ генерала
  description: Чорний довгий плащ із золотистою металевою окантовкою. Яскравий, надзвичайно захисний і показний. Гідний короля — або, в цьому випадку, генерала. Має чимало кишень.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/jacket_general.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/jacket_general.rsi
  - type: CMArmor
    melee: 35
    bullet: 35
    bio: 10
    explosionArmor: 40
  - type: ExplosionResistance
    damageCoefficient: 0
    worn: false
  - type: Storage
    grid:
    - 0,0,7,1 # 4 slots
  - type: Foldable
    canFoldInsideContainer: true
    unfoldVerbText: rmc-buttons-verb-fold
    foldVerbText: rmc-buttons-verb-fold
  - type: FoldableClothing
    foldedEquippedPrefix: jacket

- type: entity
  parent: RMCCoatJacketGeneral
  id: RMCCoatJacketGeneralFilled
  suffix: Filled
  components:
  - type: StorageFill
    contents:
    - id: CMFlash
      amount: 1
    - id: RMCTelescopicBaton
      amount: 1
    - id: RMCHandcuffs
      amount: 1

