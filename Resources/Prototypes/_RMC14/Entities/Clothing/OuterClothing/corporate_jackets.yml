- type: entity
  parent: RMCBaseJacket
  id: RMCWeYaFurCoat
  name: шуба Ве-Я
  description: "Старе, нефірмове хутряне пальто, колись видане корпоративним представникам, що перебували в суворих кліматичних умовах. Очевидно, що воно багато разів переходило з рук у руки — тканина зношена, є характерний запах, а всі ярлики виробника давно зникли. Ледь помітна корпоративна емблема збереглася, вишита над пожовклою етикеткою з написом: \"Тільки сухе чищення\""
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/cl_fur_coat.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Coats/cl_fur_coat.rsi

