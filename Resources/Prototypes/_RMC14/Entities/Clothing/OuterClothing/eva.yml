# Bases
- type: entity
  parent: RMCBaseArmor
  id: RMCSuitEVABase
  name: космічний костюм
  description: Важкий, незручний космічний костюм.
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/EVA/unmc.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/EVA/unmc.rsi
    equipDelay: 2
    unequipDelay: 2
  - type: ToggleableClothing
    clothingPrototype: RMCHelmetEVAUNMC
  - type: Tag
    tags:
    - Hardsuit
  - type: CMArmor
    bio: 30 # RMC14 TODO: 30 rads aswell
    melee: 15
    bullet: 20
    explosionArmor: 10
  - type: ClothingSpeedModifier
    walkModifier: .5
    sprintModifier: .5
  - type: CMHardArmor
  - type: RMCBulkyArmor
  - type: RMCMagneticArmor
  - type: RMCArmorSpeedTier
    speedTier: heavy

- type: entity
  parent: RMCHardHat
  id: RMCHelmetEVABase
  categories: [ HideSpawnMenu ]
  name: космічний шолом
  description: Важкий космічний шолом, створений в парі з космічним костюмом.
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Helmets/EVA/unmc.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Helmets/EVA/unmc.rsi
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
    - HeadTop
    - HeadSide
  - type: CMArmor
    bio: 30
    melee: 15
    bullet: 20
    explosionArmor: 10
  - type: BreathMask
  - type: IdentityBlocker
  - type: IngestionBlocker
  - type: PointLight
    enabled: false
    radius: 5
    offset: 0,-0.85
    rotation: 90
    softness: 5
    autoRot: true
    netsync: false
    color: "#FFFFFF"
    mask: /Textures/_RMC14/Effects/LightMasks/wide_ellipsis.png
  - type: RemoveComponents
    components:
    - type: Storage
    - type: LimitedStorage

- type: entity
  parent: RMCSuitEVABase
  id: RMCSuitEVASGO
  name: космічний костюм для смартгану
  suffix: Smart Gun harness
  description: Важкий, незручний космічний костюм. З якоїсь причини, схоже, що цей костюм має всі необхідні елементи для використання СмартГану.
  abstract: true
  components:
  - type: ClothingBlockBackpack
  - type: SmartGunArmor

# UNMC
- type: entity
  parent: RMCSuitEVABase
  id: RMCSuitEVAUNMC
  name: космічний костюм МК.35 КМПОН
  description: Важкий, незручний військовий космічний костюм, який використовується Корпусом Морської Піхоти Об'єднаних Націй та кількома іншими організаціями ОН.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/EVA/unmc.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/EVA/unmc.rsi
    equipDelay: 2
    unequipDelay: 2
  - type: ToggleableClothing
    clothingPrototype: RMCHelmetEVAUNMC
  - type: ClothingRequireEquipped
    denyReason: rmc-armor-not-marine-jumpsuit
    whitelist:
      tags:
      - RMCUniformMarine

- type: entity
  parent: RMCSuitEVASGO
  id: RMCSuitEVAUNMCSGO
  name: космічний костюм МК.35 КМПОН для системи МЛ66А
  description: Важкий, незручний військовий космічний костюм, який використовується Корпусом Морської Піхоти Об'єднаних Націй та кількома іншими організаціями ОН. Схоже, цей костюм має необхідні кріплення для сумісності з СмартГаном МЛ66А.
  components:
  - type: ClothingRequireEquipped
    denyReason: rmc-armor-not-marine-jumpsuit
    whitelist:
      tags:
      - RMCUniformMarine

- type: entity
  parent: RMCHelmetEVABase
  id: RMCHelmetEVAUNMC
  categories: [ HideSpawnMenu ]
  name: космічний шолом МК.35 КМПОН
  description: Важкий космічний шолом, створений в парі з космічним костюмом МК.35, який використовується Корпусом Морської Піхоти Об'єднаних Націй та кількома іншими організаціями ОН. Відчувається наче ви можете тут зваритися.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Helmets/EVA/unmc.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Helmets/EVA/unmc.rsi
    equipSound: /Audio/Mecha/mechmove03.ogg
    unequipSound: /Audio/Mecha/mechmove03.ogg
  - type: ClothingRequireEquipped
    denyReason: rmc-armor-not-marine-jumpsuit
    whitelist:
      tags:
      - RMCUniformMarine

