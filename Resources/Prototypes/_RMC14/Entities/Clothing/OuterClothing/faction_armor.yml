# Colonial militia
# TODO: implement storage whitelist for this
- type: entity
  parent: ClothingOuterStorageBase
  id: RMCCoatMilitia
  name: кольчуга колоніальної міліції
  description: Кольчуга члена колоніальної міліції, виготовлений із вареної шкіри та деяких сучасних броньованих пластин. Хоча це не найпотужніший вид броні і примітивний порівняно з більшістю сучасних захисних костюмів, він надає носію майже повну свободу рухів, що відповідає потребам місцевих колоністів. Також його швидко одягнути, легко сховати і дешево виготовляти у великих майстернях.
  components:
  - type: AllowSuitStorage
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Militia/rebel.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Militia/rebel.rsi
  - type: CMArmor
    melee: 20 # CLOTHING_ARMOR_MEDIUM
    bullet: 15 # CLOTHING_ARMOR_MEDIUMLOW (bullets)
    explosionArmor: 20 # CLOTHING_ARMOR_MEDIUM
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_LIGHT
    walkModifier: 0.725
    sprintModifier: 0.725
  - type: Storage
    grid:
    - 0,0,3,1 # 2 slots
  - type: FixedItemSizeStorage
  - type: IgnoreContentsSize
    items:
      tags:
      - RMCMagazineMar50LMG
      - RMCMagazineRifleMAR40
      - RMCMagazineSMGMAC15

