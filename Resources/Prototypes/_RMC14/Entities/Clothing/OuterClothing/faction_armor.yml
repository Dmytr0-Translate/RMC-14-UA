    walkModifier: 0.897
    sprintModifier: 0.897

- type: entity
  parent: RMCCoatMilitia
  id: RMCCoatMilitiaHarness
  name: колоністське бойове кріплення
  suffix: smart gun harness
  description: Кольчуга ополченця-колоніста, створений із кип'яченої шкіри та кількох сучасних бронепластин. Хоча він поступається більшості сучасних видів броні і не забезпечує високого рівня захисту, цей обладунок дарує власникові майже ідеальну рухливість, що відповідає потребам місцевих колоністів. Його також швидко вдягати, легко сховати та дешево виготовляти у великих майстернях. Цей екземпляр має додаткові ремені, переплетені з пластинами, які дозволяють користувачу стріляти зі здобутого СмартГана, хоч і дещо незручно.
  components:
  - type: SmartGunArmor

