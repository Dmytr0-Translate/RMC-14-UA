- type: entity
  parent: RMCCoatMilitia
  id: RMCCoatMilitiaHauberk
  name: половина кольчуги колоніальної міліції
  description: Кольчуга члена колоніальної міліції, виготовлений із вареної шкіри та деяких сучасних броньованих пластин. Хоча це не найпотужніший вид броні і примітивний порівняно з більшістю сучасних захисних костюмів, він надає носію майже повну свободу рухів, що відповідає потребам місцевих колоністів. Також його швидко одягнути, легко сховати і дешево виготовляти у великих майстернях. Цей ще більш легкий варіант має відсутні деякі частини на руках.
