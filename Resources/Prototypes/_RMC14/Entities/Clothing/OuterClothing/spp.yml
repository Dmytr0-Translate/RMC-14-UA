# SPP coats
- type: entity
  parent: RMCCoatBureauDeputy
  id: RMCCoatSPP
  name: офіцерська куртка СПН УЛ4
  description: Легка куртка, яка видається офіцерам збройних сил СПН. Забезпечує легкий захист, проте краще все ж носити броню.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/officer.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/officer.rsi
  - type: CMArmor
    melee: 10
    bullet: 10
    bio: 10
    explosionArmor: 10
  - type: ExplosionResistance
    damageCoefficient: 0
    worn: false
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots
  - type: FixedItemSizeStorage

- type: entity
  parent: RMCCoatBureauDeputy
  id: RMCCoatSPPSenior
  name: старша офіцерська куртка СПН УЛ4
  description: Легка куртка, яка видається старшим офіцерам збройних сил СПН. Зроблена з високоякісних матеріалів, та, на диво, має знаки розрізнення Капітана і нашивки роти на плечах і переді куртки. Забезпечує легкий захист, проте краще все ж носити броню.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/senior.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/senior.rsi
  - type: CMArmor
    melee: 10
    bullet: 10
    bio: 10
    explosionArmor: 10
  - type: Storage
    grid:
    - 0,0,7,1 # 4 slots

- type: entity
  parent: RMCCoatSPPSenior
  id: RMCCoatSPPMP
  name: камуфляжна куртка СПН УЛ4
  description: Легка куртрка, яка видається персоналу, який не бере участі у боях. Вона все ще набита до країв кевларовими вкладками, проте синтетичні нитки зменшують їх ефективність.
