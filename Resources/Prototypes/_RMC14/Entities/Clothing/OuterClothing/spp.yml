- type: entity
  parent: RMCArmorSPP
  id: RMCArmorSPPHeavy
  name: важка броня зразка УН7
  description: Надзвичайно важкий комплект броні на службі військ СПН, УН7 (Унійна Надважка Марк 7), є відомою завдяки потужному балістичному захисту, разом з виразним захистом шиї, посиленим задля можливості носіння важкого шолому.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/heavy.rsi
  - type: RMCArmorSpeedTier
    speedTier: heavy
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_HEAVY
    walkModifier: 0.62
    sprintModifier: 0.62
  - type: CMArmor
    melee: 25 # CLOTHING_ARMOR_MEDIUMHIGH (melee)
    bullet: 35 # CLOTHING_ARMOR_HIGHPLUS (bullets)
    bio: 20 # CLOTHING_ARMOR_MEDIUM
    explosionArmor: 30 # CLOTHING_ARMOR_HIGH
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots

- type: entity
