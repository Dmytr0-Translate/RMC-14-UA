- type: entity
  parent: CMArmorM3Medium
  id: RMCArmorSPPArmy
  name: броня зразка 6Б80
  description: Старий комплект броні СПН, який був замінений на стандартний комплект броні армії СПН 6Б90. Він досі використовується деякими підрозділами армії СПН третьої лінії.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/army.rsi
  - type: Clothing
