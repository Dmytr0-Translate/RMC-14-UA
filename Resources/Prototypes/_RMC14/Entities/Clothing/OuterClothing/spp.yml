# SPP armors
- type: entity
  parent: CMArmorM3Medium
  id: RMCArmorSPP
  name: броня зразка УМ5
  description: Стандартна броня військ СПН, УМ5 (Унійна Мірна Марк 5) – це середня броня, приблизно рівна за характеристиками броні зразка M3, що використовується у КМПОН, спеціалізована на захисті від куль. На відміну від М3, ця броня має важчу шийну вставку, через що багато солдатів та морпіхів ОН жартома називають солдатів СПН 'відролюдами'.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/spp.rsi
  - type: CMArmor
    bullet: 30 # CLOTHING_ARMOR_HIGH
    bio: 15 # CLOTHING_ARMOR_MEDIUMLOW
    explosionArmor: 20 # CLOTHING_ARMOR_MEDIUM
  - type: RMCArmorSpeedTier
    speedTier: medium
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_MEDIUM
    walkModifier: 0.666
    sprintModifier: 0.666
  - type: Storage
    grid:
    - 0,0,1,1 # 1 slot
  - type: ItemCamouflage
    camouflageVariations: { }
  - type: ClothingRequireEquipped
    autoUnequip: true
    denyReason: rmc-armor-not-spp-jumpsuit
    whitelist:
      tags:
      - RMCUniformSPP

- type: entity
  parent: RMCArmorSPP
  id: RMCArmorSPPRifleman
  suffix: Filled, Rifleman
  components:
  - type: StorageFill
    contents:
    - id: RMCBinoculars

- type: entity
  parent: RMCArmorSPP
  id: RMCArmorSPPSupport
  name: броня зразка УЛ6
  description: Стандартна броня військ СПН, УЛ (Унійний Легкий Марк 6) – це легка броня, трохи слабша за броню зразка М3, що використовується у КМПОН, спеціалізована на захисті від порізів. Цей комплект персональної броні позбавлений культової шийної пластини та частини захисних елементів заради більшої мобільності користувача.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/support.rsi
  - type: CMArmor
    melee: 30 # CLOTHING_ARMOR_HIGH
  - type: RMCArmorSpeedTier
    speedTier: light
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_LIGHT
    walkModifier: 0.725
    sprintModifier: 0.725
  - type: Storage
    grid:
    - 0,0,5,1 # 3 slots

- type: entity
  parent: RMCArmorSPPSupport
  id: RMCArmorSPPSupportSynth
  name: броня синтетиків СПН УЛ6
  description: Модифікована версія комплекту броні УЛ6, розробленою для використання синтетиками. Має відсутній захист, проте майже не сковує рухів.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/support.rsi
  - type: Clothing
    equipDelay: 1
    unequipDelay: 0.5
  - type: CMArmor
    melee: 0 # CLOTHING_ARMOR_NONE
    bullet: 0
    bio: 0
    explosionArmor: 0
  - type: RMCArmorSpeedTier
    speedTier: very light
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_VERY_LIGHT
    walkModifier: 0.897
    sprintModifier: 0.897

- type: entity
  parent: RMCArmorSPP
  id: RMCArmorSPPCommando
  name: броня СПН зразка УМ5СУ
  description: Модифікована версія броні УМ5, розроблена для безшумних операцій.
  components:
