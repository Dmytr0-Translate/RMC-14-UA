  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/biosuit.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/biosuit.rsi
  - type: CMArmor
    bio: 100 # CLOTHING_ARMOR_HARDCORE

- type: entity
  parent: RMCBaseBioSuit
  id: RMCSuitBioGeneral
  name: біокостюм
  description: Костюм, що захищає проти біологічних загроз.
  suffix: Generic, RMC
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/biosuit.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/biosuit.rsi
  - type: CMHardArmor
  - type: ClothingSpeedModifier # SLOWDOWN_ARMOR_LIGHT
    walkModifier: 0.725
    sprintModifier: 0.725
  - type: RMCArmorSpeedTier
    speedTier: light

- type: entity
  parent: [RMCAllowSuitStorageClothingArmorVest, RMCBaseArmor]
  id: RMCArmorFirefighter
  name: пожежний костюм ПТ-ЛТ
  description: "'ПайроТекс ЛТ' це просунутий, легкий пожежний костюм розроблений компанією 'Фуджин'. Він здатен вберегти власника від вогню та високих температур, одночасно забезпечуючи захист від тупих пошкоджень."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/firefighter.rsi
  - type: CMArmor
    melee: 15
    bio: 15
    bullet: 10
    explosionArmor: 10
  - type: CMHardArmor
  - type: RMCArmorSpeedTier
    speedTier: heavy
  - type: ClothingSpeedModifier # slowdown = 1 (SLOWDOWN_ARMOR_HEAVY)
    walkModifier: 0.62
    sprintModifier: 0.62
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.3
  - type: RMCImmuneToIgnition
    immuneToDirectHits: false
   # TODO gas_transfer_coefficient = 0.90

- type: entity
  parent: [RMCAllowSuitStorageClothingChefApron, ClothingOuterBase]
  id: RMCSuitFirefighter
  name: firesuit
  description: A suit that protects against fire and heat.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/firesuit.rsi
  - type: Item
    size: Large
  - type: RMCArmorSpeedTier
    speedTier: heavy
  - type: ClothingSpeedModifier # slowdown = 1 (SLOWDOWN_ARMOR_HEAVY)
    walkModifier: 0.62
    sprintModifier: 0.62
  - type: TemperatureProtection
    heatingCoefficient: 0.001
    coolingCoefficient: 0.3
  - type: RMCImmuneToIgnition
    immuneToDirectHits: false
  # TODO gas_transfer_coefficient = 0.90

- type: entity
  parent: RMCArmorFirefighter
  id: RMCArmorSPPFirefighter
  name: пожежне захисне пальто Т-20
  description: Міцне, без зайвих деталей вогнестійке пальто, що видається промисловим і аварійним бригадам СПН. Засноване на дизайні ПайроТекс ЛТ, але виготовлене з дешевших вітчизняних матеріалів, воно забезпечує базовий захист від тепла та уламків, жертвуючи вагою та комфортом.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/firefighter.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/SPP/firefighter.rsi

- type: entity
  parent: RMCBaseBioSuit
  id: RMCSuitBioWeYa
  name: біокостюм ВеЯ-ТСС МК 1
  description: "'Біокостюм Вестон-Ямада ТерраСаєнтія Марк 1'. Просунутий та легкий біокостюм розроблений Вестон-Ямада. Костюм, що захищає проти біологічних загроз."
  suffix: Generic, WeYa
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/biosuit_weya.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/OuterClothing/Misc/biosuit_weya.rsi
