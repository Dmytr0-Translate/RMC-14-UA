#Base
- type: entity
  parent: [ Clothing, ClothingSlotBase ]
  id: RMCScabbardBase
  name: base scabbard
  description: -- insert description here --
  abstract: true
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Back/Scabbards/machete_h5.rsi
    state: sheath
  - type: Item
    size: Large
  - type: ItemSlots
    slots:
      item:
        name: Machete
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/_RMC14/Weapons/Guns/gun_rifle_draw.ogg
        ejectSound: /Audio/_RMC14/Weapons/Guns/gun_rifle_draw.ogg
        whitelist:
          tags:
          - Machete
  - type: ItemMapper
    mapLayers:
      sheath-machete:
        whitelist:
          tags:
          - Machete
  - type: Tag
    tags:
    - Scabbard
  - type: Appearance
  - type: UsableWhileDevoured
  - type: CMHolster
  - type: CMItemSlots
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCScabbardBase
  id: RMCScabbardMachete
  name: піхви Н5 для мачете моделі М2132 
  description: Великі шкіряні піхви, створені для безпечного носіння мачете М2132. Можна носити на спині, поясі або броні.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Back/Scabbards/machete_h5.rsi
    state: sheath
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Back/Scabbards/machete_h5.rsi
    quickEquip: false
    slots:
    - back
    - belt
    - suitstorage
  - type: Tag
    tags:
    - Scabbard
    - RMCMacheteScabbard

- type: entity
  parent: RMCScabbardMachete
  id: RMCScabbardMacheteFilled
  suffix: Filled
  components:
  - type: ContainerFill
    containers:
      item:
      - CMM2132Machete

