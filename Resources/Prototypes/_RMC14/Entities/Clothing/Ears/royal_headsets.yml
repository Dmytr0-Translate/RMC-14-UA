- type: entity
  parent: RMCHeadsetIconsTSE
  id: RMCHeadsetRoyalMarine
  name: гарнітура королівської морпіхоти
  description: Елегантна гарнітура, яку використовують Морпіхи Корони. Достатньо невелика, щоби вміститися під їхніми дивакуватими шоломами.
  components:
  - type: Sprite
    state: vai_headset
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeyRoyalMarine
  - type: RMCHeadset
    channels:
    - RoyalMarine
  - type: GrantTacMapAlert

- type: entity
  parent: RMCHeadsetIconsTSE
  id: RMCHeadsetRoyalMarineLeader
  name: гарнітура лідера королівської морпіхоти
  description: Елегантна гарнітура, яку використовують Морпіхи Корони. Достатньо невелика, щоби вміститися під їхніми дивакуватими шоломами. 
  components:
  - type: Sprite
    state: vai_headset
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeyRoyalMarine
  - type: RMCHeadset
    channels:
    - RoyalMarine
    radioTextIncrease: 2
  - type: GrantTacMapAlert

- type: entity
  parent: RMCHeadsetIconsTSE
  id: RMCHeadsetRoyalMarineOfficer
  name: гарнітура офіцера королівської морпіхоти
  description: Елегантна гарнітура, яку використовують Морпіхи Корони. Достатньо невелика, щоби вміститися під їхніми дивакуватими шоломами. Конкретно ця гарнітура має більшу вагу, через вагу обов'язків.
  components:
  - type: Sprite
    state: vai_headset
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeyRoyalMarine
  - type: RMCHeadset
    channels:
    - RoyalMarine
    radioTextIncrease: 3
  - type: GrantTacMapAlert

- type: entity
  parent: CMEncryptionKey
  id: RMCEncryptionKeyRoyalMarine
  name: ключ королівської морпіхоти
  components:
  - type: EncryptionKey
    channels:
    - MarineCommand
    - MarineCommon
    - RoyalMarine
    defaultChannel: RoyalMarine
  - type: Sprite
    state: sl_key
