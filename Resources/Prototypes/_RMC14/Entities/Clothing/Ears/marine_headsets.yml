  name: морпіхотна гарнітура бойового медика альфи
  description: Використовується янголами в людській подобі.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyMedical
      - CMEncryptionKeyCommon


