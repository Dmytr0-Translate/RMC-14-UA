    - FireteamLeader
    - CommandingOfficer # Sich
    - ExecutiveOfficer # Sich
    - SeniorEnlistedAdvisor
    - PrimaryLandingZone
  - type: GrantTacMapAlert
  - type: HeadsetAutoSquad
  - type: RMCStaticDefaultChannel

# Alpha
- type: entity
  parent: RMCHeadsetMarine
  id: CMHeadsetAlpha
  name: морпіхотна гарнітура альфи
  description: Використовується для радіоперемовин загоном Альфа.
  components:
  - type: Sprite
    state: alpha_headset
  - type: EncryptionKeyHolder
    defaultChannel: MarineAlpha
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyCommon

- type: entity
  parent: CMHeadsetAlpha
  id: CMHeadsetAlphaLeader
  name: морпіхотна гарнітура лідера альфи
  description: Показує хто тут лідер, в цьому випадку Альфи.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyCommon
      - CMEncryptionKeySquadLeader
  - type: RMCHeadset
    radioTextIncrease: 3
  - type: GrantSquadLeaderTracker
    defaultMode: CommandingOfficer
    trackerModes:
    - CommandingOfficer
    - ExecutiveOfficer
    - SquadLeader
    - FireteamLeader
    - AuxiliarySupportOfficer # Sich
    - StaffOfficer # Sich
    - ChiefMilitaryPolice # Sich
    - ChiefEngineer # Sich
    - ChiefMedicalOfficer # Sich
    - Quartermaster # Sich
    - PrimaryLandingZone

- type: entity
  parent: CMHeadsetAlpha
  id: CMHeadsetAlphaTeamLeader
  name: морпіхотна гарнітура лідера вогневої групи альфи
  description: Майже лідерська, але не дотягує.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyCommon
      - CMEncryptionKeyJTAC
  - type: RMCHeadset
    radioTextIncrease: 2

- type: entity
  parent: CMHeadsetAlpha
  id: CMHeadsetAlphaEngineer
  name: морпіхотна гарнітура техніка альфи
  description: Використовується техніками Альфи щоб посперечатися з приводу розташування барикад.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyEngineer
      - CMEncryptionKeyCommon

- type: entity
  parent: CMHeadsetAlpha
