- type: entity
  parent: CMEncryptionKey
  id: RMCEncryptionKeySPP
  name: ключ СПН
  components:
  - type: Sprite
    state: upp_key
  - type: EncryptionKey
    channels:
    - SPP
    defaultChannel: SPP

- type: entity
  parent: RMCEncryptionKeySPP
  id: RMCEncryptionKeySPPCommand
  name: ключ командування СПН
  components:
  - type: EncryptionKey
    channels:
    - SPP
    - SPPCommand
    - SPPEngi
    - SPPMed
    - SPPCCT
    defaultChannel: SPP

- type: entity
  parent: RMCEncryptionKeySPP
  id: RMCEncryptionKeySPPEngineer
  name: ключ техніка СПН
  components:
  - type: EncryptionKey
    channels:
    - SPP
    - SPPEngi
    - SPPCCT
    defaultChannel: SPP

- type: entity
  parent: RMCEncryptionKeySPP
  id: RMCEncryptionKeySPPMedic
  name: ключ медика СПН
  components:
  - type: EncryptionKey
    channels:
    - SPP
    - SPPEngi
    - SPPMed
    defaultChannel: SPP

- type: entity
  parent: CMEncryptionKey
  id: RMCEncryptionKeyHalcyon
  name: ключ Гальциона
  components:
  - type: Sprite
    state: upp_key
  - type: EncryptionKey
    channels:
    - Halcyon
    defaultChannel: Halcyon

- type: entity
  abstract: true
  parent: RMCHeadsetIconsSPP
  id: RMCHeadsetSPPAbstract
  components:
  - type: GrantSquadLeaderTracker
    defaultMode: LeaderSpp
    trackerModes:
    - LeaderSpp
  - type: GrantTacMapAlert

- type: entity
  parent: RMCHeadsetSPPAbstract
  id: RMCHeadsetSPP
  name: гарнітура СПН
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeySPP

- type: entity
  parent: RMCHeadsetSPPAbstract
  id: RMCHeadsetSPPCommand
  name: гарнітура командування СПН
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeySPPCommand

- type: entity
  parent: RMCHeadsetSPPAbstract
  id: RMCHeadsetSPPEngineer
  name: гарнітура техніка СПН
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeySPPEngineer

- type: entity
  parent: RMCHeadsetSPPAbstract
  id: RMCHeadsetSPPMedic
  name: гарнітура медика СПН
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeySPPMedic

- type: entity
  parent: RMCHeadsetSPPAbstract
  id: RMCHeadsetSPPCommando
  name: гарнітура командос СПН
  description: Спеціальна гарнітура, яку використовують командос СПН.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeySPPCommand
      - CMEncryptionKeyColony

- type: entity
  parent: RMCHeadsetIconsSPP
  id: RMCHeadsetDistressSPP
  name: SPP colony headset
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyColony

- type: entity
  parent: RMCHeadsetDistressSPP
  id: RMCHeadsetSPPPaP
  name: гарнітура НоП СПН
  description: Спеціальна гарнітура, яку використовує персонал Народної озброєної Поліції СПН.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - RMCEncryptionKeySPP
      - CMEncryptionKeyColony
  - type: Sprite
    state: sec_headset

- type: entity
  parent: RMCHeadsetDistressSPP
  id: RMCHeadsetDistressHalcyon
  name: корпоративна гарнітура гальцион
  description: Гарнітура, яку, зазвичай, носить корпоративний персонал Гальцион Дайнамікс.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - CMEncryptionKeyColony
      - RMCEncryptionKeyHalcyon
