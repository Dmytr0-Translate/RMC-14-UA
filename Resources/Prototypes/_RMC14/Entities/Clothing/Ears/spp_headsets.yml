  color: "#9b0612"
  longRange: true

- type: radioChannel
  id: SPPCommand
  name: chat-radio-spp-command
  keycode: "="
  frequency: 1252
  color: "#9b0612"
  longRange: true

- type: radioChannel
  id: SPPEngi
  name: chat-radio-spp-engi
  keycode: "s"
  frequency: 1253
  color: "#9b0612"
  longRange: true

- type: radioChannel
  id: SPPMed
  name: chat-radio-spp-med
  keycode: "i"
  frequency: 1254
  color: "#9b0612"
  longRange: true

- type: radioChannel
  id: SPPCCT
  name: chat-radio-spp-cct
