  description: "Кругла, вогнетривка нашивка з білою облямівкою. Дизайн містить три білі зірки та триколірний фон: зелений, чорний та червоний, що символізують боротьбу Фронту Визволення Колоній за незалежність та єдність. Цю нашивку носять бійці ФВК як знак непокори корпоративному та урядовому гнобленню, що символізує їхню боротьбу за вільне та самостійне колоніальне майбутнє. Хоча деякі її бояться та ганьблять, вона залишається потужним символом опору та революції."
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Accessory/Patches/CLF/clf_patch.rsi
    state: icon
  - type: UniformAccessory
    playerSprite:
