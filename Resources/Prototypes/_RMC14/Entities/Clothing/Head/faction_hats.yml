# Bureau Cap
- type: entity
  parent: CMHeadCap
  id: RMCHeadCapBureau
  name: кепка бюро
  description: Темна кепка з викарбуваними могутніми літерами 'МАРШАЛ' що уособлюють справедливість, владу та захист на зовнішніх рубежах. Закони Землі поширюються далеко за межі сонячної системи.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Hats/bureau_cap.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Hats/bureau_cap.rsi

