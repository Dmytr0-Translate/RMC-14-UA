# Paramarines
- type: entity
  parent: RMCHeadRoyalBeret
  id: RMCHeadParaBeret
  name: paramarine beret
  description: A distinctive crimson beret worn by the RCM's Paramarine regiments. Reinforced with flexible Kevlar, it offers minimal protection while maintaining a traditional and respected appearance.
  suffix: Paramarine, Survivor
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Royal/para_beret.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Royal/para_beret.rsi
  - type: CMArmor
    melee: 20
    bullet: 20
    bio: 10
    explosionArmor: 20
    # armor_laser = 15
    # armor_energy = 15
    # armor_rad = 10
    # armor_internaldamage = 10

- type: entity
  parent: RMCHeadRoyalBeret
  id: RMCHeadParaBeretLead
  name: paramarine team lead beret
  description: A distinctive crimson beret worn by NCOs of the RCM's Paramarine regiments. Reinforced with flexible Kevlar, it offers minimal protection while maintaining a traditional and respected appearance.
  suffix: Paramarine, Survivor, Team Leader
  components:
    - type: Sprite
      sprite: _RMC14/Objects/Clothing/Head/Royal/para_tl_beret.rsi
    - type: Clothing
      sprite: _RMC14/Objects/Clothing/Head/Royal/para_tl_beret.rsi

- type: entity
  parent: RMCHeadCapTSEPA
  id: RMCHeadCapPeakedPara
  name: paramarine officer's service cap
  description: A distinguished service cap worn by officers of the RCM's Paramarine regiments. Featuring a crimson band, gold RCM-P emblem, and a black patent peak, it reflects the discipline and authority of the Empire’s paramarine command.
  suffix: Paramarine, Survivor, CO
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Royal/para_peaked.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Royal/para_peaked.rsi

- type: entity
  parent: RMCHeadRoyalHelmet
  id: RMCHeadRoyalL1HelmetBallistic
  name: royal L5A1 ballistic helmet
  description: An early-model L5-pattern high-cut ballistic helmet, now almost completely phased out of service. Nonetheless, offers reliable protection against shrapnel and ballistic threats.
  suffix: Paramarine, Survivor
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Royal/l1ballistic.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Royal/l1ballistic.rsi

- type: entity
  parent: RMCHeadRoyalHelmet
  id: RMCHeadRoyalFlightHelmet
  name: PH-4 'Spitfire' flight helmet
  description: Standard flight helmet used across the Three Suns Empire’s aerospace forces, from fighter pilots to atmospheric crews. This PH-4 variant is tailored for dropship operations in space, featuring reinforced plating, HUD optics, and encrypted comms. Essential for high-risk insertions, landings, and exfil missions. Nicknamed “Spitfire” for its reliability under fire.
  suffix: Paramarine, Survivor
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Royal/flighthelmet.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Royal/flighthelmet.rsi
  - type: CMArmor
    melee: 25
    explosionArmor: 20
    # armor_internaldamage = 30
  - type: CycleableVisor
    containers:
    - rmc_visor_one
    - rmc_visor_two
    - rmc_visor_three
  - type: IntegratedVisors
    visorsToAdd:
    - RMCVisorMedicalAdvancedIntegrated
    - RMCVisorSquadIntegrated
    - RMCVisorPilotBlack
