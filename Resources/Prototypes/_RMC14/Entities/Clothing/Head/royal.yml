# Royal marine helmets
- type: entity
  parent: ArmorHelmetM10
  id: RMCHeadRoyalHelmet
  name: королівський балістичний шолом Л5А2
  description: Балістичний шолом з високим профілем. Створений для Морпіхів Корони як частина комплекту броні 'Кестрел'.
  components:
    - type: Sprite
      sprite: _RMC14/Objects/Clothing/Head/Royal/helmet.rsi
    - type: Clothing
      sprite: _RMC14/Objects/Clothing/Head/Royal/helmet.rsi
    - type: ItemCamouflage
      camouflageVariations: {}
    - type: CMArmor
      bio: 10
      explosionArmor: 20
      # armor_energy = 15
      # armor_internaldamage = 10

- type: entity
  parent: RMCHeadRoyalHelmet
