      explosionArmor: 25
      # armor_energy = 25

# Cap

- type: entity
  parent: RMCHeadCapFlippable
  id: RMCHeadCapRoyal
  name: royal marine cap
  description: A soft cap available for private purchase, used to shield the face or neck from the sun depending on how it's worn.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Royal/cap.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Royal/cap.rsi
  - type: ItemCamouflage
    camouflageVariations: {}

# Boonie

- type: entity
  parent: RMCHeadCapRoyal
  id: RMCHeadBoonieRoyal
  name: royal marine boonie hat
  description: The infamous boonie hat - available for private purchase, and protects all angles... from the sun, at least.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Royal/boonie.rsi
    layers:
    - state: icon
      map: [ "unfoldedLayer" ]
    - state: icon_flipped
      map: ["foldedLayer"]
      visible: false
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Royal/boonie.rsi

# Headset

- type: entity
  parent: RMCHeadRoyalBeret
  id: RMCHeadRoyalHeadset
  name: royal marine commset
  description: A single-ear military communications headset issued to Royal Crown Marines. The monoaural design minimises loss of situational awareness whilst operating the two-way radio. This one appears to be malfunctioning.
  components:
  - type: Sprite
    sprite: _RMC14/Objects/Clothing/Head/Royal/headset.rsi
  - type: Clothing
    sprite: _RMC14/Objects/Clothing/Head/Royal/headset.rsi
  - type: HelmetAccessory
    rsi:
      sprite: _RMC14/Objects/Clothing/Head/Royal/headset.rsi
      state: helmet
    hatRsi:
      sprite: _RMC14/Objects/Clothing/Head/Royal/headset.rsi
      state: hat

