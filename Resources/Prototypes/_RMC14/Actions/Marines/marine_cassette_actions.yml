- type: entity
  abstract: true
  parent: ActionMarineBase
  id: RMCActionCassetteBase
  components:
  - type: Action
    useDelay: 0.5

- type: entity
  parent: RMCActionCassetteBase
  id: RMCActionCassettePlayPause
  name: Грати/Пауза
  description: Запускає або зупиняє програвання музики.
  components:
  - type: Action
    icon:
      sprite: _RMC14/Actions/cassette_player.rsi
      state: walkman_playpause
  - type: InstantAction
    event: !type:CassettePlayPauseActionEvent

- type: entity
  parent: RMCActionCassetteBase
  id: RMCActionCassetteNext
  name: Наступний трек
  description: Запускає відтворення наступного треку.
  components:
  - type: Action
    icon:
      sprite: _RMC14/Actions/cassette_player.rsi
      state: walkman_next
  - type: InstantAction
    event: !type:CassetteNextActionEvent

- type: entity
  parent: RMCActionCassetteBase
  id: RMCActionCassetteRestart
  name: Перезапустити трек
  description: Перезапускає відтворення поточного треку.
  components:
  - type: Action
    icon:
      sprite: _RMC14/Actions/cassette_player.rsi
      state: walkman_restart
  - type: InstantAction
    event: !type:CassetteRestartActionEvent
