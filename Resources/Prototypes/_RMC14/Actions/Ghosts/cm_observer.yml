- type: entity
  id: ActionToggleMarineHud
  name: Перемкнути ПД морпіхів
  description: Перемикає піктограми морпіхів.
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _RMC14/Interface/cm_job_icons.rsi
      state: hudsquad_co
    iconOn:
      sprite: _RMC14/Interface/cm_job_icons.rsi
      state: hudsquad_co
  - type: InstantAction
    event: !type:ToggleMarineHudActionEvent

- type: entity
  id: ActionToggleXenoHud
  name: Перемкнути ПД ксеноїдів
  description: Перемикайте показ здоров'я ксеноїдів, та їх плазмових індикаторів.
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _RMC14/Interface/Alerts/xeno_health.rsi
      state: health_full
    iconOn:
      sprite: _RMC14/Interface/Alerts/xeno_health.rsi
      state: health_full
  - type: InstantAction
    event: !type:ToggleXenoHudActionEvent

- type: entity
  id: ActionFindParasite
  name: Знайти Паразита
  description: Знайдіть паразитів, що мають ролі привидів.
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _RMC14/Actions/observer_actions.rsi
      state: find_parasite
  - type: InstantAction
    event: !type:FindParasiteActionEvent

- type: entity
  id: ActionJoinXeno
  name: Приєднатися як Ксеноїд
  description: Знайдіть зариту личинку, щоб приєднатися за неї.
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _RMC14/Actions/observer_actions.rsi
      state: join_xeno
    useDelay: 0.5
  - type: InstantAction
    event: !type:JoinXenoActionEvent

- type: entity
  id: ActionToggleVisibility
  name: Toggle Visibility
  description: Toggles your visibility, while you're invisible your friend can still hear what you say.
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: Mobs/Ghosts/ghost_human.rsi #TODO Find a better icon
      state: icon
    iconOn:
      sprite: Mobs/Ghosts/ghost_human.rsi #TODO Find a better icon
      state: icon
  - type: InstantAction
    event: !type:ImaginaryFriendToggleVisibilityActionEvent

- type: entity
  id: ActionStopBeingFriends
  name: Leave Friend
  description: Stop being an imaginary friend.
  components:
  - type: Action
    checkCanInteract: false
    icon:
      sprite: _RMC14/Actions/marine_emplacement_actions.rsi #TODO Find a better icon
      state: cancel_view
  - type: InstantAction
    event: !type:ImaginaryFriendStopBeingFriendsActionEvent
