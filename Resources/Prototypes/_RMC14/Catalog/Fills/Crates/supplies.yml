# SUPPLIES
# code/datums/supply_packs/misc.dm

# /datum/supply_packs/internals
- type: entity
  parent: RMCCrateSupply
  id: RMCCrateSupplyInternals
  name: Ящик кисневих наборів (3 маски, 3 балони)
  components:
  - type: StorageFill
    contents:
    - id: CMMaskGas
      amount: 3
    - id: RMCGasTankOxygenFilled
      amount: 3

# /datum/supply_packs/evacuation
- type: entity
  parent: RMCCrateSupply
  id: RMCCrateSupplyEvacuation
  name: Аварійне обладнання (2 ящики інструментів, 2 захисні жилети, 5 кисневих балонів, 5 масок)
  components:
  - type: StorageFill
    contents:
    - id: RMCToolboxEmergencyFilled
      amount: 2
    - id: RMCHazardVest
      amount: 2
    - id: RMCEmergencyOxygenTankFilled
      amount: 5
    - id: CMMaskGas
      amount: 5

# /datum/supply_packs/boxes
- type: entity
  id: RMCCrateSuppliesBoxes
  parent: RMCCrateSupply
  name: Ящик з картонками (50 шт) #empty boxes (x10)
  components:
  - type: StorageFill
    contents:
      - id: RMCSheetCardboard #CMBoxCardboard
        amount: 1 #10

# /datum/supply_packs/janitor
- type: entity
  parent: RMCCrateSupply
  id: RMCCrateSupplyJanitor
  name: Ящик з прибиральним обладнанням
  components:
  - type: StorageFill
    contents:
    - id: RMCBucket
      amount: 5
    - id: CMMop
      amount: 1
    - id: CMWetSign
      amount: 3
    - id: TrashBag
      amount: 1
    - id: SprayBottleSpaceCleaner
      amount: 1
    - id: RagItem
      amount: 1
    - id: CleanerGrenade
      amount: 3
    - id: CMBucketMop
      amount: 1

# /datum/supply_packs/poster
# /obj/item/poster x 5

# /datum/supply_packs/crayons
- type: entity
  id: RMCCrateSuppliesCrayons
  parent: RMCCrateSupply
  name: Коробки з олівцями (5 шт)
  components:
  - type: StorageFill
    contents:
      - id: RMCCrayonBox
        amount: 5

# /datum/supply_packs/presents
# /datum/supply_packs/wrapping_supplies

# AEGIS Lobby Event Crate
- type: entity
  parent: RMCCrateSupply
  id: RMCCrateAegisLobby
  name: Ящик з спорядженням для відстеження ЕГІДА (3 пінпоінтера та 1 памфлет)
  description: Ящик з обладнанням для відстеження обладнання ЕГІДА та необхідною документиацією.
  components:
  - type: StorageFill
    contents:
    - id: RMCPinpointerAegisID
      amount: 3
    - id: CMPamphletPowerloader
      amount: 1
