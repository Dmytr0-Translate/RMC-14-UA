- type: entity
  parent: CMFoodBase
  id: MRFoodParasiteLeg
  name: лапка паразита
  description: Колись вона бігала, а тепер час бігти смажити її!
  components:
  - type: FlavorProfile
    flavors:
    - meaty
    - acid
  - type: Tag
    tags:
    - Raw
    - Meat
  - type: Food
    transferAmount: 2
  - type: Sprite
    sprite: _Sich/Objects/Consumable/Food/xeno.rsi
    state: parasiteleg
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 10
        reagents:
        - ReagentId: Nutriment
          Quantity: 2
        - ReagentId: UncookedAnimalProteins
          Quantity: 3
        - ReagentId: RMCSulphuricAcid
          Quantity: 3
  - type: Item
    size: Tiny
    sprite: _Sich/Objects/Consumable/Food/xeno.rsi
  - type: Extractable
    grindableSolutionName: food
  - type: InjectableSolution
    solution: food
  - type: DrawableSolution
    solution: food

