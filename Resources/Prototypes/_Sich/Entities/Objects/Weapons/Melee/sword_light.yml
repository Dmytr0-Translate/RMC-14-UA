- type: entity
  name: меч світла
  parent: [ RMCBaseMeleeWeapon, BaseMeleeWeaponEnergy ]
  id: RMCSwordLight
  description: Стародавня зброя чистісінької енергії, здатна розрізати навіть найміцнішу броню ксеноморфів одним помахом. Випромінює тепле, праведне світло.
  components:
  - type: EnergySword
    ActivatedColor: "#FFD700"
    ColorOptions:
    - "#FFD700" # Gold
    - "#FFFFFF" # White
    - "#F0E68C" # Khaki/Light Yellow
    - "#E0FFFF" # Light Cyan
    - "#00FF00" # Green (for the OG feel)
  - type: ItemToggle
    soundActivate:
      path: /Audio/Weapons/ebladeon.ogg
    soundDeactivate:
      path: /Audio/Weapons/ebladeoff.ogg
  - type: ItemToggleActiveSound
    activeSound:
      path: /Audio/Weapons/ebladehum.ogg
  - type: ItemToggleHot
  - type: ItemToggleSize
    activatedSize: Huge
  - type: ItemTogglePointLight
    toggleableVisualsColorModulatesLights: true
  - type: ItemToggleMeleeWeapon
    activatedSoundOnHit:
      path: /Audio/Weapons/eblade1.ogg
      params:
        variation: 0.250
    activatedSoundOnSwing:
      path: /Audio/Weapons/eblademiss.ogg
      params:
        variation: 0.125
    activatedDamage:
      types:
        Slash: 35
        Heat: 25
        Structural: 50
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1.2
    damage:
      types:
        Blunt: 5
  - type: CMArmorPiercing
    amount: 35
  - type: Sprite
    sprite: Objects/Weapons/Melee/e_sword.rsi
    layers:
    - state: e_sword
    - state: e_sword_blade
      color: "#FFD700"
      visible: false
      shader: unshaded
      map: [ "blade" ]
  - type: Item
    sprite: Objects/Weapons/Melee/e_sword-inhands.rsi
    size: Small
  - type: PointLight
    enabled: false
    radius: 4
    energy: 3
    color: "#FFD700"
    netsync: false
  - type: Appearance
  - type: ToggleableVisuals
    spriteLayer: blade
    inhandVisuals:
      left:
      - state: inhand-left-blade
        shader: unshaded
      right:
      - state: inhand-right-blade
        shader: unshaded
  - type: Reflect
    reflectProb: 0.6
  - type: IgnitionSource
    temperature: 1000
  - type: UsableWhileDevoured
  - type: Tag
    tags:
    - RMCSwordLight
