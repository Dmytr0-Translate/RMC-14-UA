- type: entity
  parent: CMPamphlet
  id: SichPamphletSherpa
  name: довідник шерпи
  description: Тут описується, як правильно переносити важкі речі.
  components:
    - type: Sprite
      sprite: _Sich/Objects/Misc/pamphlets.rsi
      state: pamphlet_sherpa
    - type: SkillPamphlet
      addComps:
        - type: SichSherpaRifleman
      addSkills:
        RMCSkillFireman: 1
      giveJobTitle: sich-rmc-job-name-sherpa
      givePrefix: sich-rmc-job-prefix-sherpa
      isAppendPrefix: false
      giveIcon:
        sprite: _Sich/Interface/cm_job_icons.rsi
        state: hudsquad_sherpa
      giveMapBlip:
        sprite: /Textures/_Sich/Interface/map_blips.rsi
        state: sherpa
      bypassLimit: false # Sich. Особливі ролі лише один раз
      jobWhitelists:
        - popup: rmc-pamphlets-rifleman-warning
          jobProto: CMRifleman

# Я тільки зараз зрозумів, як воно схоже на шерпу, тому це фактично буде те саме, але на мінімалках. . .
- type: entity
  parent: CMPamphlet
  id: SichPamphletFireman
  name: довідник перенесення на плечах
  description: Тут описується, як правильно переносити людей на собі.
  components:
    - type: Sprite
      sprite: _Sich/Objects/Misc/pamphlets.rsi
      state: pamphlet_sherpa
    - type: SkillPamphlet
      addSkills:
        RMCSkillFireman: 1
      jobWhitelists:
        - popup: rmc-pamphlets-rifleman-warning
          jobProto: CMRifleman

- type: entity
  parent: CMPamphletLanguage
  id: MRPamphletLanguageEnglish
  name: шматок підручника з англійської мови за 7 клас
  description: Ну хоча б у 22 столітті ця штука буде мати ж сенс, так? Правильно! Тобі вистачить цього, щоб почати розуміти англійську на базовому рівні.
  components:
  - type: SkillPamphlet
    language: MREnglish
