# Наша варіація RMCBackpackAmmo під комплект Шерпи
- type: entity
  parent: RMCBackpackAmmo
  id: SichBackpackAmmo
  name: ВРС загального призначення
  description: Поєднання ременів та пласталевого каркасу що дозволяє переносити громіздкі коробки. Незважаючи на скромність конструкції, далеко не кожен зможе нести цей тягар.
  suffix: Мрія, Розгорнута
  components:
  - type: SichSherpaItem
  - type: Storage
    maxItemSize: Huge
    grid:
    - 0,0,7,1 #4 slots
    whitelist:
      tags:
      - RMCAmmoBox
      - SichFlareBox
      - SichBulletBoxSmartGun
  - type: LimitedStorage
    limits:
    - popup: rmc-storage-limit-one-bulletbox-smartgun
      whitelist:
        tags:
        - SichBulletBoxSmartGun
    - popup: rmc-storage-limit-not-flarebox
      blacklist:
        tags:
        - SichFlareBox
      whitelist: null
      count: 3
  - type: RemoveComponents
    components:
      - type: ClothingSpeedModifier
        walkModifier: 0.910
        sprintModifier: 0.850

- type: entity
  parent: BaseItem
  id: SichBackpackAmmoFolded
  name: ВРС загального призначення
  description: Згорнута вантажна рама для спорядження. Розгорніть перед використанням.
  suffix: Мрія, Згорнута
  components:
  - type: Item
    size: Huge
  - type: Sprite
    sprite: _Sich/Objects/Clothing/Back/Backpacks/Marines/ammo_rack.rsi
    state: ammo_pack-0
  - type: SpawnItemsOnUse
    items:
    - id: MRBackpackAmmo
      amount: 1
