- type: entity
  id: SichWallTerminalInputCorporate
  suffix: Вхід (Корпорат)
  parent: BaseStructureComputer
  name: настінний термінал комунікації
  description: Корпоративний термінал для прямого каналу зв'язку з Ве-Я.
  components:
  - type: Sprite
    sprite: _Sich/Structures/Machines/console.rsi
    state: wall
  - type: WallMount
    arc: 360
  - type: SichTerminal
    isInput: true
    requiredAccesses:
    - RMCAccessWeYa
  - type: Clickable
  - type: Rotatable
  - type: ActivatableUI
    key: enum.Content.Shared._Sich.Terminal.SichTerminalUiKey.Key
  - type: UserInterface
    interfaces:
      enum.Content.Shared._Sich.Terminal.SichTerminalUiKey.Key:
        type: SichTerminalBoundUserInterface
  - type: ItemSlots
    slots:
      id_card:
        name: ID Card
        whitelist:
          components:
          - IdCard
          - Pda
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          SichWallTerminalBroken:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: ["Destruction"]

