- type: entity
  id: SichMicrowave
  parent: KitchenMicrowave
  name: мікрохвильовка
  components:
  - type: Sprite
    sprite: _Sich/Structures/Machines/microwave.rsi
    layers:
    - state: mw
      map: [ "enum.MicrowaveVisualizerLayers.Base" ]
    - state: mwactiv
      shader: unshaded
      map: [ "enum.MicrowaveVisualizerLayers.BaseUnlit" ]
      visible: false
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.VisualState:
        enum.MicrowaveVisualizerLayers.Base:
          Idle: { state: "mw" }
          Cooking: { state: "mw" }
          Broken: { state: "mw" }
        enum.MicrowaveVisualizerLayers.BaseUnlit:
          Idle: { visible: false }
          Cooking: { state: "mwactiv", visible: true }
          Broken: { visible: false }
  - type: Appearance
