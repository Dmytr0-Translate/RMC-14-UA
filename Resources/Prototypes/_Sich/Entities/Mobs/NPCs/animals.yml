# Адаптація всіляких тварин під умови механік РМС (нема атмосфери, не треба гост роль)
## Так, лише ніаножук й вже не один. Ці молі класні. Питання?

# Тварини
- type: entity
  parent: [RMCRodent, MobMothroach]
  id: SichMobMothroach
  name: тарганоміль
  description: Це чарівно-пустотливий побічний продукт численних спроб генетично змішати молей з тарганами. Бззз!
  suffix: Мрія, Ніаножук
  components:
  - type: GhostRole
    prob: 0
  - type: PressureImmunity
  - type: Respirator
    minSaturation: 5.0
  - type: Temperature
    heatDamageThreshold: 423
    coldDamageThreshold: 0
  - type: Speech
    speechVerb: Moth
    speechSounds: Moth # Перенесено з КД
    allowedEmotes: ['Chitter', 'Squeak', 'Flap'] # Додано Flap
  - type: BodyEmotes # Зроблено заради Flap, вже є в Білді візардів, як буде оновлення від них – видалити нашу
    soundsId: SichMothBodyEmotes
  - type: Vocal
    sounds:
      Male: UnisexMoth
      Female: UnisexMoth
      Unsexed: UnisexMoth
  - type: Inventory
    templateId: Sichmothroach
  - type: UserIFF
    factions:
    - FactionMarine

- type: entity
  parent: SichMobMothroach
  id: SichMobMothroachSynth
  name: синтетична тарганоміль
  description: "Це чарівно-пустотливий побічний продукт розробки синтетиків у вигляді ніан. Роботичне бззз!\nМає ледь помітний напис \"Прототип Люнет\" на лівому крилі."
  suffix: Мрія, Ніаножук, Адмеме
  components:
  - type: Sprite
    sprite: _Sich/Mobs/Pets/synth_mothroach.rsi
  - type: Clothing
    sprite: _Sich/Mobs/Pets/synth_mothroach.rsi
  - type: Synth
  - type: CMArmor # Так, її не знищити
    immuneToAP: true
    melee: 50
    bullet: 50
    bio: 50
    explosionArmor: 100
  - type: RMCImmuneToFireTileDamage
  - type: CanEscapeInventory
    baseResistTime: 0.5 # 5 в оригінальної
  - type: StunOnHit # Щоб кусати тих, хто чипає
    whitelist:
      components:
      - Marine
  - type: StaminaDamageOnHit
    damage: 100
  - type: MeleeRequiresSkill # Щоб не могли бити нею
    skills:
      RMCSkillPolice: 3
  - type: Skills
    skills:
      RMCSkillPolice: 3
  - type: TacticalMapIcon
    icon:
      sprite: /Textures/_RMC14/Interface/map_blips.rsi
      state: synth
  - type: Puller
    needsHands: false
  - type: VentCrawler
    ventCrawlIcon: lesser
  - type: RMCTrayCrawler
  # Вбудована гарнітура старт
  - type: CMGhost
  - type: ViewIntelObjectives
  - type: GrantAreaInfo
  - type: UserInterface
    interfaces:
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
      enum.TacticalMapUserUi.Key:
        type: TacticalMapUserBui
      enum.ViewIntelObjectivesUI.Key:
        type: ViewIntelObjectivesBui
        requireInputValidation: false
      enum.SquadLeaderTrackerUI.Key:
        type: SquadInfoBui
      enum.DialogUiKey.Key:
        type: DialogBui
  - type: TacMapMarineAlert
  - type: TacticalMapUser
    actionId: RMCActionOpenTacticalMapGhost
    marines: true
    xenos: true
    liveUpdate: true
  - type: ShowMarineIcons
    factions:
    - UNMC
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
    channels:
    - Hivemind
    - MarineCommon
    - MarineCommand
    - MarineMilitaryPolice
    - MarineAlpha
    - MarineBravo
    - MarineCharlie
    - MarineDelta
    - MarineEcho
    - MarineFoxtrot
    - MarineEngineer
    - MarineMedical
    - MarineRequisition
    - MarineJTAC
    - MarineIntel
  - type: ActiveRadio
    channels:
    - Hivemind
    - MarineCommon
    - MarineCommand
    - MarineMilitaryPolice
    - MarineAlpha
    - MarineBravo
    - MarineCharlie
    - MarineDelta
    - MarineEcho
    - MarineFoxtrot
    - MarineEngineer
    - MarineMedical
    - MarineRequisition
    - MarineJTAC
    - MarineIntel
  - type: SquadLeaderTracker
    mode: Synthetic
    trackerModes:
    - Synthetic
    - CommandingOfficer
    - ExecutiveOfficer
    - AuxiliarySupportOfficer
    - StaffOfficer
    - ChiefMilitaryPolice
    - ChiefEngineer
    - ChiefMedicalOfficer
    - Quartermaster
    - SquadLeader
    - PrimaryLandingZone
  # Вбудована гарнітура все
  - type: Access
    groups:
    - ShipMasterAccess
    - Corp
    - Colony
    - Synth
  - type: RemoveComponents
    components:
    - type: Destructible # Щоб не розривало на шмаття
    - type: ReplacementAccent # Вона може повноцінно балакати
      accent: mothroach

# Спавнера
- type: entity
