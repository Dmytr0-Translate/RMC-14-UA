# Тут емоції перенесені з інших білдів, бо... Бо чому ні?
## Емоція перенесена з Губу, також була додана в білд Візардів, але біс зна, коли це буде перенесено в РМС. Тож, коли нарешті зроблять – видалити ось це
- type: emote
  id: Flap
  name: sich-chat-emote-name-flap
  category: Vocal
  available: false
  icon: _Sich/Interface/Emotes/flap.png
  whitelist:
    components:
      - Vocal
  blacklist:
    components:
    - BorgChassis
  chatMessages: ["sich-chat-emote-msg-flap"]
  chatTriggers:
   - маше крилами
   - машуть крилами
   - трепушить крилами
   - трепушать крилами
   - тріпотить крилами
   - тріпотять крилами

