- type: entity
  id: AutodocHunter
  parent: BaseMachine
  name: авто-лікар
  description: Просунута технологія що здатна проводити хірургічні операцію на паціенті.
  components:
  - type: AutodocHunter
  - type: Sprite
    sprite: _Sich/Hunter/Structures/Machines/Medical/autodoc.rsi
    state: closed # Or whichever state the RSI uses
    snapCardinals: true
  - type: Physics
    bodyType: Static
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StrongMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: EntityStorage
    capacity: 1
    isCollidableWhenOpen: true
    showContents: false
    occludesLight: false
  - type: Lock
    locked: true
  - type: AccessReader
    access: [["RMCAccessHunter"]]
  - type: ContainerContainer
    containers:
      entity_storage: !type:Container
  - type: ActivatableUI
    key: enum.AutodocHunterUiKey.Key
    requireLock: false
    requireHands: false
  - type: UserInterface
    interfaces:
      enum.AutodocHunterUiKey.Key:
        type: AutodocHunterBoundUserInterface
