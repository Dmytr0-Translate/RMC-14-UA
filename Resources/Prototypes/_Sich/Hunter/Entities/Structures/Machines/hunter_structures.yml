- type: entity
  parent: SMESAdvanced
  id: HunterSMES
  name: СМЕС
  description: Високотехнологічний накопичувач енергії для масивних кораблів
  suffix: Infinite
  components:
  - type: Sprite
    sprite: _Sich/Hunter/Structures/smes.rsi
  - type: Icon
    sprite: _Sich/Hunter/Structures/smes.rsi
    state: smes
  - type: Battery
    maxCharge: 1000000000
    startingCharge: 1000000000
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 1000000000
  - type: PowerNetworkBattery
    maxSupply: 1000000000
    maxCharge: 0

