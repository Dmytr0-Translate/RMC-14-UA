- type: entity
  id: SichMicrowave
  parent: KitchenMicrowave
  name: мікрохвильовка
  components:
  - type: Sprite
    sprite: _Sich/Hunter/Structures/Machines/microwave.rsi
    layers:
    - state: mw
      map: [ "enum.MicrowaveVisualizerLayers.Base" ]
    - state: mwactiv
      shader: unshaded
      map: [ "enum.MicrowaveVisualizerLayers.BaseUnlit" ]
      visible: false
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.VisualState:
        enum.MicrowaveVisualizerLayers.Base:
          Idle: { state: "mw" }
          Cooking: { state: "mw" }
          Broken: { state: "mw" }
        enum.MicrowaveVisualizerLayers.BaseUnlit:
          Idle: { visible: false }
          Cooking: { state: "mwactiv", visible: true }
          Broken: { visible: false }
  - type: Appearance

- type: entity
  id: SichVendingMachineHuntSoda
  parent: VendingMachineCola
  name: хант-сода
  components:
  - type: VendingMachine
    offState: soda
    brokenState: soda
    normalState: soda
    ejectState: soda
    denyState: soda
  - type: Sprite
    sprite: _Sich/Hunter/Structures/Machines/hunt_soda.rsi
    layers:
    - state: soda
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: soda
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded

- type: entity
