- type: entity
  id: HunterSpear
  parent: AbstractHunterMeleeBase
  name: спис
  description: Потужний дворучний спис, створений для полювання на найнебезпечнішу здобич. Виготовлений зі сплаву титану з таємничою домішкою, що дарує йому неймовірну міцність та довговічність, здатну витримати удари навіть найсильніших чудовиськ.
  suffix: Sich, Hunter
  components:
  - type: Sprite
    sprite: _Sich/Objects/Weapons/Melee/spear.rsi
    state: spear
  - type: Item
    size: Large
  - type: MeleeWeapon
    attackRate: 0.8
    damage:
      types:
        Piercing: 28
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 43
  - type: Sharp
  - type: EmbeddableProjectile
  - type: ThrowingAngle
    angle: -45
  - type: LandAtCursor
  - type: Clothing
    sprite: _Sich/Objects/Weapons/Melee/spear.rsi
    slots:
    - Back
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
  - type: IncreaseDamageOnWield
    damage:
      types:
        Piercing: 10
  - type: Wieldable
    wieldInhanded: true

- type: entity
