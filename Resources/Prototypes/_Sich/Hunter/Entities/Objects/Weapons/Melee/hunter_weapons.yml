    sprite: _Sich/Objects/Weapons/Melee/long_axe.rsi
    state: icon
  - type: Item
    size: Large
  - type: MeleeWeapon
    wideAnimationRotation: 135
    swingLeft: true
    attackRate: 0.5
    damage:
      types:
        Blunt: 45
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: Wieldable
    wieldInhanded: true
  - type: IncreaseDamageOnWield
    damage:
      types:
        Slash: 20
  - type: MeleeRequiresWield
  - type: Clothing
    sprite: _Sich/Objects/Weapons/Melee/long_axe.rsi
    slots:
    - Back
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
  - type: Tool
    qualities:
    - Prying

