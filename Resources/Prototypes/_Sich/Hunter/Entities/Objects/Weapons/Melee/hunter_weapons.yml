- type: entity
  abstract: true
  id: AbstractHunterMeleeBase
  parent: [BaseItem, RMCBaseMeleeWeapon]
  components:
  - type: MeleeDamageMultiplier
    multiplier: 2.2
    whitelist:
      components:
      - Xeno
  - type: CMArmorPiercing
    amount: 10

- type: entity
  id: HunterDuellingSword
  parent: AbstractHunterMeleeBase
  name: дуелянтний меч
  description: Дуелянтний меч - остання міра вирішення конфліктів серед мисливців. Використовується для ритуальних двобоїв мисливців.
  suffix: Sich, Hunter
  components:
  - type: Sprite
    sprite: _Sich/Hunter/Objects/Weapons/Melee/hunter_duelling_sword.rsi
    state: icon
  - type: Item
    size: Large
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1.2
    damage:
      types:
        Slash: 18
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: Clothing
    sprite: _Sich/Hunter/Objects/Weapons/Melee/hunter_duelling_sword.rsi
    slots:
    - Belt
  - type: DisarmMalus

- type: entity
  parent: AbstractHunterMeleeBase
  id: HunterSword
  name: клановий меч
  description: Меч що належить до клана.
  suffix: Sich, Hunter
  components:
  - type: Sprite
    sprite: _Sich/Hunter/Objects/Weapons/Melee/hunter_sword.rsi
    state: icon
  - type: Item
    size: Large
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1.0
    damage:
      types:
        Slash: 22
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Sharp
  - type: Execution
    doAfterDuration: 4.0
  - type: Clothing
    sprite: _Sich/Hunter/Objects/Weapons/Melee/hunter_sword.rsi
    slots:
    - Belt
    - Back
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
  - type: DisarmMalus

- type: entity
  parent: HunterSword
  id: HunterSwordRending
  name: роздираючий меч
  description: Меч клана, призначений для нанесення глибоких ран.
