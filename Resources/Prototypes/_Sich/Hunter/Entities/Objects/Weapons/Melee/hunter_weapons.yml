- type: entity
  id: HunterCombistick
  parent: AbstractHunterMeleeBase
  name: комбі-жезл
  description: Складаний жезл мисливця, створений для мобільності та раптових атак. Легким рухом розгортається з компактної форми в довгу зброю.
  suffix: Sich, Hunter
  components:
  - type: Sprite
    sprite: _Sich/Hunter/Objects/Weapons/Melee/hunter_combistick.rsi
    state: combistick_f
  - type: Item
    size: Small
    sprite: _Sich/Hunter/Objects/Weapons/Melee/hunter_combistick.rsi
  - type: ItemToggle
  - type: ItemToggleSize
    activatedSize: Large
  - type: ItemToggleMeleeWeapon
    activatedDamage:
      types:
        Piercing: 25
    activatedSoundOnHit:
      path: /Audio/Weapons/genhit1.ogg
  - type: MeleeWeapon
    attackRate: 1.1
    damage:
      types:
        Blunt: 10
  - type: Sharp
  - type: Wieldable
    wieldInhanded: true
  - type: IncreaseDamageOnWield
    damage:
      types:
        Piercing: 10
  - type: HandheldItemVisuals
    wieldedPrefix: wielded
  - type: HunterRecallWeapon
  - type: Clothing
    sprite: _Sich/Hunter/Objects/Weapons/Melee/hunter_combistick.rsi
    slots:
    - Belt
    - Back
    clothingVisuals:
      back:
      - state: equipped-BACKPACK
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ToggleableVisuals.Enabled:
        enum.ToggleableVisuals.Layer:
          True: {state: combistick}
          False: {state: combistick_f}
  