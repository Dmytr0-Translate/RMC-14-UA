    sprite: _Sich/Hunter/Objects/Weapons/Melee/hunter_sword.rsi
    state: icon1
  - type: Clothing
    sprite: _Sich/Hunter/Objects/Weapons/Melee/hunter_sword.rsi
    slots:
    - Belt
    - Back
    clothingVisuals:
      back:
      - state: equipped-BACKPACK1

- type: entity
