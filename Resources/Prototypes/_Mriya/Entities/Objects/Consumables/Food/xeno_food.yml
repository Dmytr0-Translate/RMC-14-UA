- type: entity
  parent: CMFoodBase
  id: MRFoodParasiteLeg
  name: лапки паразита
  description: Колись вони бігали, а тепер час з'їсти їх та побігти далі
  components:
  - type: FlavorProfile
    flavors:
    - meaty
    - acid
  - type: Tag
    tags:
    - Raw
    - Meat
  - type: Food
    transferAmount: 2
  - type: Sprite
    sprite: _Mriya/Objects/Consumable/Food/xeno.rsi
    state: parasiteleg
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 30
        reagents:
        - ReagentId: Nutriment
          Quantity: 5
        - ReagentId: UncookedAnimalProteins
          Quantity: 3
        - ReagentId: RMCSulphuricAcid
          Quantity: 4
  - type: Item
    size: Tiny
    sprite: _Mriya/Objects/Consumable/Food/xeno.rsi
  - type: Extractable
    grindableSolutionName: food
  - type: InjectableSolution
    solution: food
  - type: DrawableSolution
    solution: food

