# Sich. Змінено під наші потреби
- id: "GeneralBlacklist"
  type: "Blacklist"
  entityMatchers:
  - "CMStamp.*" # All stamps.
  - "CMIdCard.*" # All ID cards.
  - "RMCAdminAccessConfigurator"
  - "RMCAdminFax"
  - "AdminPDA"
  - "AdminHypo"
  - "RMCPillAntiZed"
  - "RMCBottleAntiZed"
  - "RMCBlackGooGlassFull"
  - "RMCBlackGooGlassAntiZedFull"
  - "RMCPlushieAlec"
  - "RMCPlushieNyx"
  - "RMCPlushieXippy"
  - "RMCPlushieProvost"
  - "RMCPlushieCrow"
  - "RMCPlushieMotivationalMoth"

- id: "AllowApprovedDeniedStamps" # These two stamps specifically are not a problem and should be left untouched.
  type: "Whitelist"
  entityMatchers:
  - "CMStampApproved"
  - "CMStampDenied"

- id: "AllowAllOnAdminMaps"
  type: "Whitelist"
  on_paths:
  - "admin_fax_old.yml"
  entityMatchers:
  - ".*"

- id: "AllowStampsOnWarshipMaps"
  type: "Whitelist"
  on_paths:
  - "savannah.yml"
  - "tundra.yml"
  entityMatchers:
  - "CMStamp.*" # All stamps.
  - "RMCPlushieAlec"
  - "RMCPlushieNyx"
  - "RMCPlushieXippy"
  - "RMCPlushieProvost"
  - "RMCPlushieCrow"
  - "RMCPlushieMotivationalMoth"
